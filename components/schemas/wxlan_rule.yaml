description: WXlan
properties:
  action:
    description: type of action, allow / block
    enum:
    - allow
    - block
    type: string
  blocked_apps:
    description: blocked apps (always blocking, ignoring action), the key of Get Application
      List
    items:
      type: string
    type: array
  created_time:
    readOnly: true
    type: number
  dst_allow_wxtags:
    description: tag list to indicate these tags are allowed access
    items:
      type: string
    type: array
  dst_deny_wxtags:
    description: tag list to indicate these tags are blocked access
    items:
      type: string
    type: array
  enabled:
    default: true
    type: boolean
  for_site:
    readOnly: true
    type: boolean
  id:
    format: uuid
    readOnly: true
    type: string
  modified_time:
    readOnly: true
    type: number
  order:
    description: the order how rules would be looked up, > 0 and bigger order got
      matched first, -1 means LAST, uniqueness not checked
    type: number
  org_id:
    format: uuid
    type: string
  site_id:
    format: uuid
    readOnly: true
    type: string
  src_wxtags:
    description: tag list to determine if this rule would match
    items:
      type: string
    type: array
required:
- order
- src_wxtags
title: wxlan_rule
type: object
