description: API Token
properties:
  created_by:
    description: for Org token only. email of the token creator / null if creator
      is deleted
    nullable: true
    type: string
  created_time:
    readOnly: true
    type: integer
  id:
    format: uuid
    readOnly: true
    type: string
  key:
    readOnly: true
    type: string
  last_used:
    nullable: true
    readOnly: true
    type: integer
  name:
    description: name of the token
    type: string
  org_id:
    format: uuid
    readOnly: true
    type: string
  privileges:
    description: list of privileges the token has on the orgs/sites
    items:
      $ref: ./privileges.yaml
    minItems: 1
    type: array
    uniqueItems: true
title: apitoken
type: object
