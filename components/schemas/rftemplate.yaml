description: RF Template
properties:
  ant_gain_24:
    type: integer
  ant_gain_5:
    type: integer
  band_24:
    $ref: ./ap_radio_band.yaml
  band_24_usage:
    default: '24'
    description: If `band_24_usage`==`5`, by default, `band_5` properties is used,
      if specific channel/bandwidth/power/... If desired, use `band_5_on_24_radio`
    enum:
    - '24'
    - '5'
    - auto
    type: string
  band_5:
    $ref: ./ap_radio_band.yaml
  band_5_on_24_radio:
    $ref: ./ap_radio_band.yaml
  country_code:
    description: optional, country code to use. If specified, this gets applied to
      all sites using the RF Template
    type: string
  created_time:
    readOnly: true
    type: number
  for_site:
    readOnly: true
    type: boolean
  id:
    format: uuid
    readOnly: true
    type: string
  model_specific:
    additionalProperties:
      properties:
        band_24:
          $ref: ./ap_radio_band.yaml
        band_5:
          $ref: ./ap_radio_band.yaml
      type: object
    description: overwrites for a specific model. If a band is specified, it will
      shadow the default. The property key is the model name (e.g. "AP63")
    type: object
  modified_time:
    readOnly: true
    type: number
  name:
    description: The name of the RF template
    type: string
  org_id:
    format: uuid
    readOnly: true
    type: string
  scanning_enabled:
    description: whether scanning radio is enabled
    type: boolean
  site_id:
    format: uuid
    readOnly: true
    type: string
required:
- name
title: rftemplate
type: object
x-examples:
  example-1:
    band_24:
      bandwidth: 20
      channels:
      - 1
      - 6
      - 11
      disabled: false
      power: 16
    band_5:
      bandwidth: 40
      disabled: false
      power: 0
      power_max: 18
      power_min: 10
      preamble: short
    country_code: US
    model_specific:
      AP61:
        band_5:
          bandwidth: 40
          channels:
          - 100
          - 104
          disabled: false
          power: 0
    name: 5G-Restricted
