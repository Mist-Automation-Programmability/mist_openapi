- description: Initiate a gateway (SSR) Packet Capture
  properties:
    duration:
      default: 600
      description: duration of the cpture, in seconds
      example: 600
      maximum: 86400
      minimum: 0
      type: integer
    format:
      default: pcap
      enum:
      - stream
      - pcap
      example: stream
      type: string
    gateways:
      additionalProperties:
        properties:
          ports:
            additionalProperties:
              properties:
                tcpdump_expression:
                  description: tcpdump expression per port
                  type: string
              type: object
            description: Property key is the port ID
            type: object
        type: object
      description: List of SSRs. Property key is the SSR MAC
      type: object
    max_pkt_len:
      default: 128
      description: max_len of each packet to capture
      example: 1500
      maximum: 2048
      minimum: 0
      type: integer
    num_packets:
      default: 1024
      description: number of packets to capture, 0 for unlimited
      minimum: 0
      type: integer
    type:
      default: gateway
      enum:
      - gateway
      example: gateway
      type: string
  required:
  - type
- description: Initiate a scan radio Packet Capture
  properties:
    ap_mac:
      description: filter by ap_mac
      nullable: true
      type: string
    aps:
      additionalProperties:
        description: Property key is the AP MAC address (e.g. "5c5b35000001"). All
          optionals, parent parameters will be used if not defined
        properties:
          band:
            default: '24'
            description: Only Single value allowed
            enum:
            - '24'
            - '5'
            - '6'
            type: string
          channel:
            description: specify the channel value where scan PCAP has to be started
            type: string
          tcpdump_expression:
            description: tcpdump expression, port specific if specified under ports
              dict, otherwise applicable across ports if specified at top level of
              payload. Port specific value overrides top level value when both exist.
            type: string
          width:
            description: specify the bandwidth value with respect to the channel.
            type: string
        type: object
      type: object
    band:
      default: '24'
      description: Only Single value allowed
      enum:
      - '24'
      - '5'
      - '6'
      type: string
    channel:
      description: specify the channel value where scan PCAP has to be started
      type: string
    client_mac:
      description: filter by client mac
      type: string
    duration:
      default: 600
      description: duration of the capture, in seconds
      maximum: 86400
      minimum: 0
      type: integer
    format:
      default: pcap
      enum:
      - pcap
      - stream
      type: string
    max_pkt_len:
      default: 512
      description: max_len of each packet to capture
      maximum: 2048
      minimum: 128
      type: integer
    num_packets:
      default: 1024
      description: number of packets to capture, 0 for unlimited
      type: integer
    tcpdump_expression:
      description: tcpdump expression, port specific if specified under ports dict,
        otherwise applicable across ports if specified at top level of payload. Port
        specific value overrides top level value when both exist.
      type: string
    type:
      default: scan
      type: string
    width:
      description: specify the bandwidth value with respect to the channel.
      type: string
  required:
  - type
- description: Initiate a switch (Junos) Packet Capture
  properties:
    duration:
      default: 600
      description: duration of the capture, in seconds
      maximum: 86400
      minimum: 0
      type: integer
    format:
      default: pcap
      enum:
      - pcap
      - stream
      type: string
    max_pkt_len:
      default: 512
      description: max_len of each packet to capture
      maximum: 2048
      minimum: 128
      type: integer
    num_packets:
      default: 1024
      description: number of packets to capture, 0 for unlimited
      type: integer
    switches:
      additionalProperties:
        properties:
          ports:
            additionalProperties:
              nullable: true
              type: object
            description: Property key is the interface name
            type: object
        type: object
      description: Property key is the switch mac
      type: object
    tcpdump_expression:
      description: tcpdump expression, port specific if specified under ports dict,
        otherwise applicable across ports if specified at top level of payload. Port
        specific value overrides top level value when both exist.
      type: string
    type:
      enum:
      - switch
      type: string
description: ''
