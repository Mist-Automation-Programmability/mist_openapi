    type:
      default: wired
      description: wired
      enum:
      - wired
      type: string
  required:
  - type
- description: Initiate a Wireless Packet Capture
  properties:
    ap_mac:
      nullable: true
      type: string
    band:
      default: '24'
      enum:
      - '24'
      - '5'
      - '6'
      - 24,5,6
      type: string
    duration:
      default: 600
      description: duration of the cpture, in seconds
      maximum: 86400
      type: integer
    format:
      default: pcap
      description: pcap format
      enum:
      - pcap
      - string
      type: string
    max_pkt_len:
      default: 128
      description: max_len of each packet to capture
      maximum: 2048
      type: integer
    num_packets:
      default: 1024
      description: number of packets to capture, 0 for unlimited
      type: integer
    ssid:
      type: string
    type:
      default: wlan
      description: wlan
      enum:
      - wlan
      type: string
    wlan_id:
      description: WLAN ID
      format: uuid
      type: string
