anyOf:
- description: Initiate a Client Packet Capture
  properties:
    ap_mac:
      nullable: true
      type: string
    client_mac:
      description: client mac, required if `type`==`client`; optional otherwise
      nullable: true
      type: string
    duration:
      default: 600
      description: duration of the capture, in seconds
      maximum: 86400
      type: integer
    includes_mcast:
      type: boolean
    max_pkt_len:
      default: 128
      maximum: 2048
      type: integer
    num_packets:
      default: 1024
      description: number of packets to capture, 0 for unlimited, default is 1024
        for client-capture
      type: integer
    ssid:
      description: optional filter by ssid
      nullable: true
      type: string
    type:
      default: client
      description: client
      enum:
      - client
      type: string
  required:
  - type
- description: Initiate a packet Capture for New Wireless Client Associations
  properties:
    ap_mac:
      nullable: true
      type: string
    client_mac:
      description: client mac, required if `type`==`client`; optional otherwise
      nullable: true
      type: string
    duration:
      default: 600
      description: duration of the capture, in seconds
      maximum: 86400
      type: integer
    includes_mcast:
      type: boolean
    max_pkt_len:
      default: 128
      maximum: 2048
      type: integer
    num_packets:
      default: 100
      description: number of packets to capture, 0 for unlimited
      type: integer
    ssid:
      description: optional filter by ssid
      nullable: true
      type: string
    type:
      default: new_assoc
      description: new-assoc
      enum:
      - new_assoc
      type: string
  required:
  - type
- description: Initiate a Wired Packet Capture
  properties:
    ap_mac:
      nullable: true
      type: string
    duration:
      default: 600
      description: duration of the capture, in seconds
      maximum: 86400
      type: integer
    format:
      default: pcap
      description: pcap format
      enum:
      - pcap
      - string
      type: string
    max_pkt_len:
      default: 128
      description: max_len of each packet to capture
      maximum: 2048
      type: integer
    num_packets:
      default: 1024
      description: number of packets to capture, 0 for unlimited
