description: Admin
properties:
  admin_id:
    format: uuid
    readOnly: true
    type: string
  email:
    format: email
    type: string
  enable_two_factor:
    readOnly: true
    type: boolean
  first_name:
    description: for an invite, this is the original first name used
    type: string
  hours:
    default: 24
    description: how long the invite should be valid
    maximum: 168
    minimum: 1
    type: integer
  last_name:
    description: for an invite, this is the original last name used
    type: string
  oauth_google:
    readOnly: true
    type: boolean
  phone:
    description: phone number (numbers only, including country code)
    type: string
  phone2:
    description: secondary phone number (numbers only, including country code)
    type: string
  privileges:
    description: list of privileges the admin has on the MSP / Orgs / OrgGroups
    items:
      $ref: ./privileges.yaml
    minItems: 1
    readOnly: true
    type: array
    uniqueItems: true
  session_expiry:
    readOnly: true
    type: integer
  tags:
    items:
      type: string
    readOnly: true
    type: array
  two_factor_verified:
    description: two factor status
    readOnly: true
    type: boolean
  via_sso:
    description: an admin alogin via_sso is more restircted. (password and email cannot
      be changed)
    readOnly: true
    type: string
required:
- email
- first_name
- last_name
title: admin
type: object
x-examples:
  example-1:
    privileges:
    - role: write
      scope: org
      view: reporting
    - role: write
      scope: site
      site_id: d96e3952-53e8-4266-959a-45acd55f5114
      view: reporting
    - role: write
      scope: sitegroup
      sitegroup_id: 581328b6-e382-f54e-c9dc-999983183a34
      view: reporting
