properties:
  id:
    readOnly: true
    type: string
  name:
    type: string
  pod_names:
    additionalProperties:
      type: string
    description: Property key is the pod number
    type: object
  switches:
    items:
      properties:
        deviceprofile_id:
          example: 6a1deab1-96df-4fa2-8455-d5253f943d06
          type: string
        downlink_ips:
          items:
            type: string
          readOnly: true
          type: array
        downlinks:
          items:
            type: string
          readOnly: true
          type: array
        esilaglinks:
          items:
            type: string
          type: array
        evpn_id:
          type: integer
        mac:
          minLength: 1
          type: string
        pod:
          default: 1
          description: "optionally, for distribution / access / esilag-access, they\
            \ can be placed into different pods.\ne.g. \n* for CLOS, to group dist\
            \ / access switches into pods\n* for ERB/CRB, to group dist / esilag-access\
            \ into pods"
          maximum: 255
          minimum: 1
          type: integer
        role:
          description: use `role`==`none` to remove a switch from the topology
          enum:
          - core
          - distribution
          - access
          - collapsed-core
          - none
          - esilag-access
          minLength: 1
          type: string
        site_id:
          example: 1916d52a-4a90-11e5-8b45-1258369c38a9
          type: string
        uplinks:
          items:
            type: string
          readOnly: true
          type: array
      type: object
    type: array
    uniqueItems: true
required:
- switches
title: junos_evpn_topology
type: object
x-examples:
  example-1:
    id: string
    name: string
    pod_names:
      property1: string
      property2: string
    switches:
    - deviceprofile_id: 6a1deab1-96df-4fa2-8455-d5253f943d06
      downlink_ips:
      - string
      downlinks:
      - string
      esilaglinks:
      - string
      evpn_id: 0
      mac: string
      pod: 1
      role: core
      site_id: 1916d52a-4a90-11e5-8b45-1258369c38a9
      uplinks:
      - string
