description: Gateway matching
properties:
  enable:
    type: boolean
  rules:
    items:
      additionalProperties:
        description: 'property key define the type of matchine. e.g: `match_name[0:3]`,
          `match_model[0-6]` or   `match_role`'
        type: string
      properties:
        additional_config_cmds:
          items:
            type: string
          type: array
        name:
          type: string
        port_config:
          additionalProperties:
            $ref: ./junos_port_config.yaml
          type: object
      type: object
    minItems: 1
    type: array
    uniqueItems: true
title: template_gateway.matching
type: object
x-examples:
  example-1:
    enable: true
    rules:
    - additional_config_cmds:
      - set snmp community public
      match_model: EX4300
      match_name[0:3]: abc
      name: match by name
      port_config:
        '*':
          usage: default
        ge-0/0/0:
          usage: uplink
        ge-0/0/8-16,ge-1/0/0-47:
          usage: ap
    - additional_config_cmds:
      - set snmp community public2
      match_role: access
      name: match by role
      port_config:
        ge-0/0/0:
          usage: uplink
