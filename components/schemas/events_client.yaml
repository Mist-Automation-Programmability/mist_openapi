description: client events
properties:
  ap:
    type: string
  band:
    enum:
    - '24'
    - '5'
    type: string
  bssid:
    type: string
  channel:
    type: integer
  proto:
    description: b / g / n / a / ac
    enum:
    - a
    - b
    - g
    - n
    - ac
    - ax
    type: string
  ssid:
    type: string
  text:
    type: string
  timestamp:
    type: number
  type:
    description: event type, e.g. MARVIS_EVENT_CLIENT_FBT_FAILURE
    type: string
  type_code:
    description: for assoc/disassoc events
    type: integer
  wlan_id:
    format: uuid
    type: string
required:
- proto
- timestamp
- band
title: events_client
type: object
x-examples:
  example-1:
    ap: 5c5b350eb31b
    band: '5'
    bssid: 5c5b350918f1
    channel: 149
    proto: ac
    ssid: Guest
    text: 'Status code 0 "Successful" '
    timestamp: 1513358874.667
    type: CLIENT_DNS_OK
    type_code: 15
    wlan_id: be22bba7-8e22-e1cf-5185-b880816fe2cf
