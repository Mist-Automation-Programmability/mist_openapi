description: vBeacon
properties:
  created_time:
    readOnly: true
    type: number
  for_site:
    readOnly: true
    type: boolean
  id:
    format: uuid
    readOnly: true
    type: string
  major:
    description: bluetooth tag major
    type: integer
  map_id:
    description: map where the device belongs to
    format: uuid
    type: string
  message:
    description: a message that can be displayed when the sdkclient gets near the
      vbeacon
    type: string
  minor:
    description: bluetooth tag minor
    type: integer
  modified_time:
    readOnly: true
    type: number
  name:
    description: name / label of the device
    type: string
  org_id:
    format: uuid
    readOnly: true
    type: string
  power:
    default: 4
    description: required if `power_mode`==`custom`, -30 - 100, in dBm. For default
      power_mode, power = 4 dBm.
    maximum: 100
    minimum: -30
    type: integer
  power_mode:
    default: default
    description: default / custom
    enum:
    - default
    - custom
    type: string
  site_id:
    format: uuid
    readOnly: true
    type: string
  url:
    description: URL to show, optional
    type: string
  uuid:
    description: bluetooth tag UUID
    format: uuid
    type: string
  wayfinding_nodename:
    description: the name to be used in wayfinding_path or wayfinding_grid blob
    type: string
  x:
    description: x in pixel
    type: number
  y:
    description: y in pixel
    type: number
title: vbeacon
