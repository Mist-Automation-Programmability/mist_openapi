properties:
  defaults:
    additionalProperties:
      description: list of interfaces names (e.g. "ge-0/0/3,ge-1/0/3")
      type: string
    description: Object Key is the interface type name (e.g. "lan_ports", "wan_ports",
      ...)
    type: object
  description:
    type: string
  experimental:
    default: false
    type: boolean
  fans_pluggable:
    default: true
    type: boolean
  ha_node0_fpc:
    type: integer
  ha_node1_fpc:
    type: integer
  has_bgp:
    default: false
    type: boolean
  has_fxp0:
    default: true
    type: boolean
  has_ha_control:
    default: false
    type: boolean
  has_ha_data:
    default: false
    type: boolean
  has_irb:
    default: false
    type: boolean
  has_poe_out:
    default: true
    type: boolean
  has_snapshot:
    default: true
    type: boolean
  irb_disabled_by_default:
    default: false
    type: boolean
  model:
    type: string
  number_fans:
    type: integer
  oc_device:
    default: false
    type: boolean
  pic:
    additionalProperties:
      description: list of type and number of ports (e.g. "mge*8, ge*16")
      type: string
    description: Object Key is the PIC number
    type: object
  ports:
    description: Object Key is the interface name (e.g. "ge-0/0/1", ...)
    properties:
      display:
        type: string
      pci_address:
        type: string
      speed:
        type: integer
    type: object
  sub_required:
    type: string
  t128_device:
    default: false
    type: boolean
  type:
    enum:
    - gateway
    type: string
title: const_device_gateway
type: object
