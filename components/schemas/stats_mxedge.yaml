description: ''
properties:
  cpu_stat:
    description: CPU/core stats list
    properties:
      cpus:
        additionalProperties:
          properties:
            idle:
              type: integer
            interrupt:
              type: integer
            system:
              type: integer
            usage:
              type: integer
            user:
              type: integer
          type: object
        type: object
      idle:
        description: percentage of Idle, Idle/(Idle + Busy) since last sampling
        type: integer
      interrupt:
        description: percentage of Interrupt, (Irq + SoftIrq)/(Idle + Busy) since
          last sampling
        type: integer
      system:
        description: percentage of System, System/(Idle + Busy) since last sampling
        type: integer
      usage:
        description: percentage of load, Busy/(Idle + Busy) since last sampling
        type: integer
      user:
        description: percentage of User, User/(Idle + Busy) since last sampling
        type: integer
    type: object
  created_time:
    type: integer
  for_site:
    type: boolean
  id:
    format: uuid
    type: string
  ip_stat:
    description: OOBM IP stats
    properties:
      ip:
        type: string
      ips:
        additionalProperties:
          type: string
        description: Property key is the interface name. IPs for each net interface
        type: object
      macs:
        additionalProperties:
          description: MAC addresses for each net interface
          type: string
        description: Property key is the interface name. MAC for each net interface
        type: object
    type: object
  lag_stat:
    additionalProperties:
      properties:
        active_ports:
          description: list of ports active on the LAG defined by the LACP
          items:
            type: string
          type: array
      type: object
    description: Stat for LAG (Link Aggregation Group). Property key is the LAG name
    type: object
  last_seen:
    type: integer
  mac:
    type: string
  memory_stat:
    description: Memory usage
    properties:
      active:
        description: The amount of memory, in kibibytes, that has been used more recently
          and is usually not reclaimed unless absolutely necessary.
        type: integer
      available:
        description: An estimate of how much memory is available for starting new
          applications, without swapping.
        type: integer
      buffers:
        description: The amount, in kibibytes, of temporary storage for raw disk blocks.
        type: integer
      cached:
        description: The amount of physical RAM, in kibibytes, used as cache memory.
        type: integer
      free:
        description: The amount of physical RAM, in kibibytes, left unused by the
          system
        type: integer
      inactive:
        description: The amount of memory, in kibibytes, that has been used less recently
          and is more eligible to be reclaimed for other purposes.
        type: integer
      swap_cached:
        description: The amount of memory, in kibibytes, that has once been moved
          into swap, then back into the main memory, but still also remains in the
          swapfile.
        type: integer
      swap_free:
        description: The total amount of swap free, in kibibytes.
        type: integer
      swap_total:
        description: The total amount of swap available, in kibibytes.
        type: integer
      total:
        description: Total amount of usable RAM, in kibibytes, which is physical RAM
          minus a number of reserved bits and the kernel binary code
        type: integer
      usage:
        type: integer
    type: object
  model:
    type: string
  modified_time:
    type: integer
  mxagent_registered:
    type: boolean
  mxcluster_id:
    format: uuid
    type: string
  name:
    description: The name of the tunnel
    type: string
  num_tunnels:
    type: integer
  org_id:
    format: uuid
    type: string
  port_stat:
    additionalProperties:
      properties:
        full_duplex:
          type: boolean
        mac:
          type: string
        rx_bytes:
          type: number
        rx_errors:
          type: integer
        rx_pkts:
          type: integer
        speed:
          type: integer
        state:
          type: string
        tx_bytes:
          type: integer
        tx_errors:
          type: integer
        tx_pkts:
          type: integer
        up:
          type: boolean
      type: object
    type: object
  sensor_stat:
    type: object
  service_stat:
    description: stat for each services
    properties:
      mxagent:
        properties:
          ext_ip:
            description: "external IP from ep-terminator\u2019s point of view. valid\
              \ only for service having its own cloud connection"
            type: string
          last_seen:
            description: timestamp when the last stats is seen (cloud unix time, in
              second). valid only for service having its own stats or whole system
              (last among last_seen of all services)
            type: integer
          package_state:
            description: package/service installation state.
            type: string
          package_version:
            description: package/service installation state.
            type: string
          running_state:
            description: service running state.
            type: string
          uptime:
            description: service uptime.
            type: integer
        type: object
      tunterm:
        properties:
          ext_ip:
            description: "external IP from ep-terminator\u2019s point of view. valid\
              \ only for service having its own cloud connection"
            type: string
          last_seen:
            description: timestamp when the last stats is seen (cloud unix time, in
              second). valid only for service having its own stats or whole system
              (last among last_seen of all services)
            type: integer
          package_state:
            description: package/service installation state.
            type: string
          package_version:
            description: package/service installation state.
            type: string
          running_state:
            description: service running state.
            type: string
          uptime:
            description: service uptime.
            type: integer
        type: object
    type: object
  services:
    items:
      type: object
    type: array
  site_id:
    format: uuid
    type: string
  status:
    type: string
  tunterm_id:
    format: uuid
    type: string
  tunterm_ip_config:
    properties:
      gateway:
        type: string
      ip:
        type: string
      netmask:
        type: string
    type: object
  tunterm_port_config:
    properties:
      downstream_ports:
        items:
          type: object
        type: array
      separate_upstream_downstream:
        type: boolean
      upstream_ports:
        items:
          type: object
        type: array
    type: object
  tunterm_registered:
    type: boolean
  tunterm_stat:
    properties:
      monitoring_failed:
        type: boolean
    type: object
  uptime:
    type: integer
  virtualization_type:
    description: Virtualization environment
    type: string
