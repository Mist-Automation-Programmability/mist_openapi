description: Org Settings
properties:
  auto_device_naming:
    properties:
      enable:
        type: boolean
      rules:
        items:
          $ref: ./org_auto_rules.yaml
        nullable: true
        type: array
    type: object
  auto_deviceprofile_assignment:
    properties:
      enable:
        type: boolean
      rules:
        items:
          $ref: ./org_auto_rules.yaml
        nullable: true
        type: array
    type: object
  auto_site_assignment:
    properties:
      enable:
        type: boolean
      rules:
        items:
          $ref: ./org_auto_rules.yaml
        nullable: true
        type: array
    type: object
  blacklist_url:
    example: https://papi.s3.amazonaws.com/blacklist/xxx...
    readOnly: true
    type: string
  cacerts:
    description: list of PEM-encoded ca certs
    items:
      example: '-----BEGIN CERTIFICATE-----\nMIIFZjCCA06gAwIBAgIIP61/1qm/uDowDQYJKoZIhvcNAQELBQE\n-----END
        CERTIFICATE-----'
      type: string
    type: array
  celona:
    properties:
      api_key:
        example: $2a$04$OkaLCoJn6rDjR8ha.oduQVDST3.kJNIrte
        type: string
      api_prefix:
        example: cc3273fcb016470e
        type: string
    type: object
  cloudshark:
    properties:
      apitoken:
        example: accbd6f10c6d05c3
        type: string
      url:
        description: if using CS Enteprise
        example: https://cloudshark.hosted.domain
        type: string
    type: object
  cradlepoint:
    properties:
      cp_api_id:
        example: 84446d61-2206-4ea5-855a-0043f980be54
        type: string
      cp_api_key:
        example: 79c329da9893e34099c7d8ad5cb9c941
        type: string
      ecm_api_id:
        example: 73446d61-2206-4ea5-855a-0043f980be62
        type: string
      ecm_api_key:
        example: 68b329da9893e34099c7d8ad5cb9c940
        type: string
    type: object
  created_time:
    readOnly: true
    type: number
  device_cert:
    description: common device cert, optional
    properties:
      cert:
        example: '-----BEGIN CERTIFICATE-----\nMIIFZjCCA06gAwIBAgIIP61/1qm/uDowDQYJKoZIhvcNAQELBQE\n-----END
          CERTIFICATE-----'
        type: string
      key:
        example: '-----BEGIN PRI...'
        type: string
    type: object
  device_updown_threshold:
    default: 0
    description: "enable threshold-based device down delivery via \n1) device-updowns\
      \ webhooks topic, \n2) Mist Alert Framework; e.g. send AP/SW/GW down event only\
      \ if AP/SW/GW Up is not seen within the threshold in minutes; 0 - 240, default\
      \ is 0 (trigger immediate)"
    maximum: 30
    minimum: 0
    type: integer
  disable_pcap:
    default: false
    description: whether to disallow Mist to analyze pcap files (this is required
      for marvis pcap)
    type: boolean
  disable_remote_shell:
    default: false
    description: whether to disable remote shell access for an entire org
    type: boolean
  for_site:
    readOnly: true
    type: boolean
  gateway_mgmt:
    properties:
      app_probing:
        properties:
          apps:
            description: app-keys from /api/v1/const/applications
            items:
              type: string
            type: array
        type: object
      app_usage:
        type: boolean
    type: object
  id:
    format: uuid
    readOnly: true
    type: string
  installer:
    properties:
      allow_all_devices:
        type: boolean
      allow_all_sites:
        type: boolean
      extra_site_ids:
        items:
          example: 4ac1dcf4-9d8b-7211-65c4-057819f0862b
          format: uuid
          type: string
        type: array
      grace_period:
        type: number
    type: object
  juniper:
    properties:
      accounts:
        items:
          properties:
            linked_by:
              type: string
            name:
              type: string
          type: object
        type: array
      customer_name:
        type: string
      linked:
        type: boolean
    type: object
  mgmt:
    description: management-related properties
    properties:
      mxtunnel_ids:
        description: list of Mist Tunnels
        items:
          example: 08cd7499-5841-51c8-e663-fb16b6f3b45e
          format: uuid
          type: string
        type: array
      use_mxtunnel:
        default: false
        description: whether to use Mist Tunnel for mgmt connectivity,  this takes
          precedence over use_wxtunnel
        type: boolean
      use_wxtunnel:
        default: false
        description: whether to use wxtunnel for mgmt connectivity
        type: boolean
    type: object
  mist_nac:
    properties:
      cacerts:
        description: the CA certs we use to verify client certs
        example: '-----BEGIN CERTIFICATE-----\nMIIFZjCCA06gAwIBAgIIP61/1qm/uDowDQYJKoZIhvcNAQELBQE\n-----END
          CERTIFICATE-----'
        type: string
      default_idp_id:
        description: use this IDP when no explicit realm present in the incoming username/CN
          OR when no IDP is explicitly mapped to the incoming realm.
        type: string
      idps:
        items:
          properties:
            id:
              example: 4c441a74-d0de-32c4-78a7-a05e00d080ae
              readOnly: true
              type: string
            realm:
              description: 'which realm should trigger this IDP.

                we extract user realm from

                1. Username-AVP (`mist.com` from john@mist.com)

                2. Cert CN '
              items:
                example: abc
                type: string
              type: array
          type: object
        type: array
      server_cert:
        description: radius server cert to be presented in EAP TLS
        properties:
          cert:
            example: '-----BEGIN CERTIFICATE-----\nMIIFZjCCA06gAwIBAgIIP61/1qm/uDowDQYJKoZIhvcNAQELBQE\n-----END
              CERTIFICATE-----'
            type: string
          key:
            example: '-----BEGIN PRI...'
            type: string
          password:
            description: private key password (optional)
            type: string
        type: object
    type: object
  modified_time:
    readOnly: true
    type: number
  msp_id:
    format: uuid
    readOnly: true
    type: string
  mxedge_mgmt:
    $ref: ./org_auto_rules.yaml
  org_id:
    format: uuid
    readOnly: true
    type: string
  password_policy:
    description: password policy
    properties:
      enabled:
        default: false
        description: whether the policy is enabled
        type: boolean
      freshness:
        description: days, required if password policy is enabled
        example: 60
        type: integer
      min_length:
        default: 8
        description: required password length
        type: integer
      requires_special_char:
        default: false
        description: whether to require special character
        type: boolean
      requires_two_factor_auth:
        default: false
        description: whether to require two-factor auth
        type: boolean
    type: object
  pcap:
    properties:
      bucket:
        example: myorg-pcap
        type: string
      max_pkt_len:
        default: 128
        description: max_len of non-management packets to capture
        example: 128
        maximum: 128
        type: integer
    type: object
  pcap_bucket_verified:
    type: boolean
  security:
    properties:
      disable_local_ssh:
        description: whether to disable local SSH (by default, local SSH is enabled
          with allow_mist in Org is enabled
        type: boolean
      fips_zeroize_password:
        description: password required to zeroize devices (FIPS) on site level
        example: NUKETHESITE
        type: string
      limit_ssh_access:
        default: false
        description: whether to allow certain SSH keys to SSH into the AP (see Site:Setting)
        type: boolean
    type: object
  simple_alert:
    $ref: ./org_auto_rules.yaml
  site_id:
    format: uuid
    readOnly: true
    type: string
  switch_mgmt:
    properties:
      ap_affinity_threshold:
        default: 12
        description: If the field is set in both site/setting and org/setting, the
          value from site/setting will be used.
        example: 10
        type: integer
    type: object
  tags:
    description: list of tags
    items:
      type: string
    type: array
  ui_idle_timeout:
    default: 0
    description: automatically logout the user when UI session is inactive. `0` means
      disabled
    example: 10
    maximum: 480
    minimum: 0
    type: integer
  vpn_options:
    properties:
      as_base:
        maximum: 4294967295
        minimum: 1
        type: integer
    type: object
  wan_pma:
    properties:
      enabled:
        default: false
        type: boolean
    type: object
  wired_pma:
    properties:
      enabled:
        default: false
        type: boolean
    type: object
title: org_setting
type: object
