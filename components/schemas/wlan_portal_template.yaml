    default: true
    type: boolean
  tosAcceptLabel:
    description: prefix of the label of the link to go to /tos
    type: string
  tosError:
    description: error message when tos not accepted
    type: string
  tosLink:
    description: label of the link to go to /tos
    type: string
  tosText:
    description: text of the Terms of Service
    type: string
