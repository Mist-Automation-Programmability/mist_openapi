properties:
  created_time:
    readOnly: true
    type: number
  enabled:
    default: true
    description: whether webhook is enabled
    type: boolean
  for_site:
    readOnly: true
    type: boolean
  headers:
    description: 'custom headers : the headers name and value must be string, total
      bytes of headers name and value must be less than 1000'
    nullable: true
    type: object
  id:
    format: uuid
    readOnly: true
    type: string
  modified_time:
    readOnly: true
    type: number
  name:
    description: name of the webhook
    nullable: true
    type: string
  org_id:
    format: uuid
    readOnly: true
    type: string
  secret:
    description: "only if `type`=`http-post`\nwhen `secret` is provided, two HTTP\
      \ headers will be added:\n  * X-Mist-Signature-v2: HMAC_SHA256(secret, body)\n\
      \  * X-Mist-Signature: HMAC_SHA1(secret, body)"
    nullable: true
    type: string
  site_id:
    format: uuid
    readOnly: true
    type: string
  splunk_token:
    description: splunk token (If splunk_token is not defined for a type Splunk webhook,
      it will not send, regardless if the webhook receiver is configured to accept
      it.)
    nullable: true
    type: string
  topics:
    default: []
    description: N.B. For org webhooks, only device-events/alarms/audits/client-join/client-sessions/nac-sessions
      topics are supported.
    items:
      enum:
      - alarms
      - asset-raw
      - asset-raw-rssi
      - audits
      - client-join
      - client-sessions
      - device-events
      - device-updowns
      - discovered-raw-rssi
      - location
      - mxedge-events
      - nac-sessions
      - occupancy-alerts
      - rssizone
      - sdkclient-scan-data
      - vbeacon
      - wifi-conn-raw
      - wifi-unconn-raw
      - zone
      type: string
    type: array
  type:
    description: http-post (default) / splunk / google-pubsub / aws-sns
    enum:
    - http-post
    - splunk
    nullable: true
    type: string
  url:
    nullable: true
    type: string
  verify_cert:
    default: false
    description: when url uses HTTPS, whether to verify the certificate
    type: boolean
title: webhook
type: object
x-examples:
  example-http_post:
    enabled: true
    headers:
      x-custom-1: your_custom_header_value1
      x-custom-2: your_custom_header_value2
    name: analytic
    secret: secret
    topics:
    - location
    - zone
    - vbeacon
    - rssizone
    - asset-raw
    - device-events
    - alarms
    - audits
    - client-join
    - client-sessions
    - device-updowns
    - occupancy-alerts
    - mxedge-events
    - calea-clients
    type: http-post
    url: https://username:password@hooks.abc.com/uri/...
  example-splunk:
    enabled: true
    name: analytic
    splunk_token: token
    topics:
    - location
    - zone
    - vbeacon
    - rssizone
    - asset-raw
    - device-events
    - alarms
    - audits
    - client-join
    - client-sessions
    - device-updowns
    - occupancy-alerts
    - mxedge-events
    - calea-clients
    type: splunk
    url: https://my.splunk.host:8088/services/collector
    verify_cert: false
