properties:
  evpn_overlay:
    description: if this is created for evpn overlay
    type: boolean
  for_overlay:
    description: if this is created for overlay
    type: boolean
  local_as:
    description: AS
    type: integer
  mac:
    description: router mac address
    type: string
  neighbor:
    type: string
  neighbor_as:
    type: integer
  neighbor_mac:
    description: if it's another device in the same org
    type: string
  node:
    description: node0/node1
    type: string
  org_id:
    description: router org ID
    type: string
  rx_pkts:
    type: integer
  rx_routes:
    description: number of received routes
    type: integer
  site_id:
    description: router site ID
    type: string
  state:
    enum:
    - idle
    - connect
    - active
    - open_sent
    - open_config
    - established
    type: string
  timestamp:
    type: number
  tx_pkts:
    type: integer
  tx_routes:
    type: integer
  up:
    type: boolean
  uptime:
    type: integer
  vrf_name:
    type: string
