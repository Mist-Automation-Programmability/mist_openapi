description: A network represents a network segment. It can either represent a VLAN
  (then usually ties to a L3 subnet), optionally associate it with a subnet which
  can later be used to create addition routes. Used for ports doing `family ethernet-switching`.
  It can also be a pure L3-subnet that can then be used against a port that with `family
  inet`.
properties:
  dns:
    items:
      type: string
    type: array
  dns_suffix:
    items:
      type: string
    type: array
  gateway:
    type: string
  ospf_interface_type:
    type: string
  subnet:
    description: optional for pure switching, required when L3 / routing features
      are used
    type: string
  vlan_id:
    type: integer
  zone:
    description: used for gateway
    type: string
required:
- vlan_id
title: junos_networks
type: object
x-examples:
  example-1:
    corp:
      subnet: 192.168.70.0/24
      vlan_id: 60
      zone: trust
    dedicated:
      ospf_interface_type: p2p
      subnet: 10.18.14.72/30
    default:
      vlan_id: 1
      zone: trust
    it_mgmt:
      subnet: 192.168.70.0/24
      zone: trust
    wan:
      zone: untrust
