properties:
  auth_algo:
    description: authentication algorithm
    type: string
  encrypt_algo:
    description: encryption algorithm
    type: string
  ike_version:
    description: ike version
    type: string
  ip:
    description: ip address
    type: string
  last_event:
    description: reason of why the tunnel is down
    type: string
  mac:
    description: router mac address
    type: string
  node:
    description: node0/node1
    type: string
  org_id:
    type: string
  peer_host:
    description: peer host
    type: string
  peer_ip:
    description: peer ip address
    type: string
  protocol:
    enum:
    - ipsec
    - gre
    type: string
  rx_bytes:
    type: integer
  rx_pkts:
    type: integer
  site_id:
    type: string
  tunnel_name:
    description: Mist Tunnel Name
    type: string
  tx_bytes:
    type: integer
  tx_pkts:
    type: integer
  up:
    type: boolean
  uptime:
    description: duration from first (or last) SA was established
    type: integer
title: stats_wantunnel
type: object
