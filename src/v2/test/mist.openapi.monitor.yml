  /api/v1/sites/{site_id}/location/coverage:
    get:
      description: Get Beam Coverage Overview
      operationId: getSiteBeamCoverageOverview
      parameters:
      - description: map_id (filter by map_id)
        example: 00000000-0000-0000-0000-000000000000
        in: query
        name: map_id
        schema:
          type: string
      - in: query
        name: type
        schema:
          default: sdkclient
          enum:
          - sdkclient
          - client
          - asset
          type: string
      - description: where the start time will be calculated (with end time is now)
        in: query
        name: duration
        schema:
          default: 1h
          enum:
          - 1d
          - 5h
          - 1h
          - 30m
          type: string
      - $ref: '#/components/parameters/resolution'
      - description: client_type (as filter. optional)
        in: query
        name: client_type
        schema:
          type: string
      - $ref: '#/components/parameters/start'
      - $ref: '#/components/parameters/end'
      responses:
        '200':
          content:
            application/json:
              examples:
                example-1:
                  value:
                    beams_means:
                    - - 1
                      - 3
                      - 3.2
                    - - 6
                      - 10
                      - 6.5
                    end: 1428954000
                    gridsize: 1
                    result_def:
                    - x
                    - y
                    - beams_mean
                    - beacons_mean
                    - max_rssi
                    - avg_rssi
                    results:
                    - - 1
                      - 3
                      - 3.2
                      - 18.5
                      - -68
                      - -70
                    - - 6
                      - 10
                      - 6.5
                      - 30
                      - 1
                      - -72.5
                      - -75
                    start: 1428939600
              schema:
                properties:
                  beams_means:
                    description: list of [x, y, mean]s, x/y are in meters (UI would
                      need to use map.ppm to calulate the pixel location from top-left).
                    items:
                      items:
                        type: number
                      type: array
                    type: array
                  end:
                    type: integer
                  gridsize:
                    description: the size of grid, in meter
                    type: number
                  result_def:
                    description: list of names annotating the fields in results
                    items:
                      type: string
