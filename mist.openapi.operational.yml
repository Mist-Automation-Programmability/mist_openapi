    map:
      description: Map
      properties:
        created_time:
          readOnly: true
          type: number
        flags:
          description: name/val pair objects for location engine to use
          type: object
        for_site:
          readOnly: true
          type: boolean
        height:
          description: when type=image, height of the image map
          type: number
        height_m:
          type: number
        id:
          format: uuid
          readOnly: true
          type: string
        latlng_br:
          description: when type=google, latitude / longitude of the bottom-right
            corner
          properties:
            lat:
              type: string
            lng:
              type: string
          type: object
        latlng_tl:
          description: when type=google, latitude / longitude of the top-left corner
          properties:
            lat:
              type: string
            lng:
              type: string
          type: object
        locked:
          default: false
          description: whether this map is considered locked down
          type: boolean
        modified_time:
          readOnly: true
          type: number
        name:
          description: The name of the map
          type: string
        occupancy_limit:
          type: integer
        org_id:
          format: uuid
          readOnly: true
          type: string
        orientation:
          default: 0
          description: orientation of the map, 0 means up is north, 90 means up is
            west
          type: number
        origin_x:
          description: the user-annotated x origin, pixels
          type: number
        origin_y:
          description: the user-annotated y origin, pixels
          type: number
        ppm:
          description: when type=image, pixels per meter
          type: number
        site_id:
          format: uuid
          readOnly: true
          type: string
        sitesurvey_path:
          description: sitesurvey_path
          items:
            properties:
              coordinate:
                type: string
              id:
                format: uuid
                type: string
              name:
                type: string
              nodes:
                items:
                  $ref: '#/components/schemas/map_node'
                minItems: 0
                type: array
            type: object
          minItems: 0
          type: array
        thumbnail_url:
          description: when type=image, the url for the thumbnail image / preview
          readOnly: true
          type: string
        type:
          default: image
          enum:
          - image
          - google
          type: string
        url:
          description: when type=image, the url
          readOnly: true
          type: string
        use_auto_orientation:
          default: false
          description: whether this map uses autooreintation values or ignores them
          type: boolean
        use_auto_placement:
          default: false
          description: whether this map uses autoplacement values or ignores them
          type: boolean
        view:
          description: when type=google
          enum:
          - roadmap
          - satellite
          - hybrid
          - terrain
          nullable: true
          type: string
        wall_path:
          description: a JSON blob for wall definition (same format as wayfinding_path)
          properties:
            coordinate:
              type: string
            name:
              type: string
            nodes:
              items:
                $ref: '#/components/schemas/map_node'
              minItems: 0
              type: array
          type: object
        wayfinding:
          description: properties related to wayfinding
          properties:
            micello:
              properties:
                account_key:
                  type: string
                default_level_id:
                  type: integer
                map_id:
                  format: uuid
                  type: string
              type: object
            snap_to_path:
              type: boolean
          type: object
        wayfinding_path:
          description: "a JSON blob for wayfinding (using Dijkstra\u2019s algorithm)"
          properties:
            coordinate:
              type: string
            nodes:
              items:
                $ref: '#/components/schemas/map_node'
              minItems: 0
              type: array
          type: object
        width:
