    site_gateway:
      description: Gateway Site settings
      properties:
        admin_sshkeys:
          description: for SSR only, as direct root access is not allowed
          items:
            type: string
          type: array
        app_probing:
          properties:
            apps:
              items:
                type: string
              type: array
            custom_apps:
              items:
                properties:
                  app_type:
                    type: string
                  hostname:
                    items:
                      type: string
                    type: array
                  name:
                    type: string
                  protocol:
                    default: http
                    enum:
                    - http
                    - tcp
                    - udp
                    type: string
                type: object
              type: array
            enabled:
              type: boolean
          type: object
        app_usage:
          description: consumes uplink bandwidth, requires WA license
          type: boolean
        auto_signature_update:
          properties:
            day_of_week:
              description: optional, daily if omitted
              type: string
            enable:
              default: true
              type: boolean
            time_of_day:
              description: optional, Mist will decide the timing
              type: string
          type: object
        config_revert_timer:
          default: 10
          description: he rollback timer for commit confirmed
          maximum: 30
          minimum: 1
          type: number
        probe_hosts:
          format: ipv4
          items:
            type: string
          type: array
        root_password:
          description: for SRX only
          type: string
        security_log_source_address:
          type: string
        security_log_source_interface:
          type: string
      type: object
      x-examples:
        example-1:
          app_probing:
            apps:
            - string
            custom_apps:
            - app_type: string
              hostname:
              - string
              name: string
              protocol: http
            enabled: true
          app_usage: true
          config_revert_timer: 10
    site_mxtunnel:
      description: Site MxTunnel
      properties:
        ap_subnets:
          description: list of subnets where we allow AP to establish Mist Tunnels
            from
          items:
            type: string
          type: array
        clusters:
          description: for AP, how to connect to tunterm or radsecproxy
          items:
            properties:
              name:
                type: string
              tunterm_hosts:
                items:
                  type: string
                type: array
            type: object
          type: array
        created_time:
          readOnly: true
          type: number
        for_site:
          readOnly: true
          type: boolean
        hello_interval:
          default: 60
          description: in seconds, used as heartbeat to detect if a tunnel is alive.
            AP will try another peer after missing N hellos specified by hello_retries
          maximum: 300
          minimum: 1
          type: integer
        hello_retries:
          default: 7
          maximum: 30
          minimum: 2
          type: integer
        hosts:
          description: hostnames or IPs where a Mist Tunnel will use as the Peer (i.e.
            they are reachable from AP)
          items:
            type: string
          type: array
        id:
          format: uuid
          readOnly: true
          type: string
        modified_time:
          readOnly: true
          type: number
        mtu:
          default: 0
          description: 0 to enable PMTU, 552-1500 to start PMTU with a lower MTU
          maximum: 1500
          minimum: 0
          type: integer
        org_id:
          format: uuid
          readOnly: true
          type: string
        protocol:
          enum:
          - udp
          - ip
          type: string
        radsec:
          properties:
            acct_servers:
              items:
                $ref: '#/components/schemas/acct_server'
              type: array
            auth_servers:
              items:
                $ref: '#/components/schemas/auth_server'
              type: array
            enabled:
              type: boolean
            use_mxedge:
              type: boolean
          type: object
        site_id:
          format: uuid
          readOnly: true
          type: string
        vlan_ids:
          description: list of vlan_ids that will be use
          items:
            anyOf:
            - type: integer
            - type: string
          type: array
      type: object
      x-examples:
        example-1:
          ap_subnets: 0.0.0.0/0
          clusters:
          - name: primary
            tunterm_hosts:
            - mxedge1
            - mxedge2.local
          enabled: false
          hello_interval: 60
          hello_retries: 3
          mtu: 1100
          protocol: udp
          radsec:
            acct_servers:
            - host: 1.2.3.4
              port: 1812
              secret: testing123
            auth_servers:
            - host: 1.2.3.4
              port: 1812
              secret: testing123
            - host: radius.internal
              port: 1812
              secret: testing123
            enabled: true
            use_mxedge: true
          vlan_ids:
          - 3
          - 5
          - 6
