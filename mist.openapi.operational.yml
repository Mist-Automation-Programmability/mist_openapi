                    type: object
                  vpn_neighbor_mac:
                    description: overlay-facing criteria (used for bgp_config where
                      via=vpn)
                    items:
                      type: string
                    type: array
                  vpn_path:
                    description: 'overlay-facing criteria (used for bgp_config where
                      via=vpn)

                      ordered-'
                    items:
                      type: string
                    type: array
                  vpn_path_sla:
                    properties:
                      max_jitter:
                        nullable: true
                        type: integer
                      max_latency:
                        example: 1500
                        nullable: true
                        type: integer
                      max_loss:
                        example: 30
                        nullable: true
                        type: integer
                    type: object
                type: object
            type: object
          type: array
          uniqueItems: true
      type: object
      x-examples:
