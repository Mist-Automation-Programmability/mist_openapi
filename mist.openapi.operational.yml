          properties:
            enabled:
              default: false
              type: boolean
            hours:
              description: "time ranges, the key is mon / tue / wed / thu / fri /\
                \ sat / sun, the value is time range in \u201CHH:MM-HH:MM\u201D (24-hour\
                \ format), the minimum resolution is 30 minute"
              type: object
          type: object
        site_id:
          format: uuid
          readOnly: true
          type: string
        sle_excluded:
          default: false
          description: whether to exclude this WLAN from SLE metrics
          type: boolean
        ssid:
