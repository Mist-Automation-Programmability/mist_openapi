  /api/v1/orgs/{org_id}/devices/{device_id}/provision_tunnels:
    parameters:
    - $ref: '#/components/parameters/org_id'
    - $ref: '#/components/parameters/device_id'
    post:
      description: "Create credential for gateways\n\nOn the zscaler side, we\u2019\
        ll use `<mac>-primary-1` as FQDN or descriptions for Location / VPN Credential\
        \ / GRE that we created. Those objects will also be marked as partner-created.\n"
      operationId: provisionOrgTunnel
      requestBody:
        content:
          application/json:
            examples:
              Example 1:
                value:
                  latlng:
                    lat: 37.295833
                    lng: -122.032946
                  name: tunnel-name
                  num_users: 100
                  primary:
                    num_hosts: 1
                    wan_names:
                    - wan0
                  protected_net: 192.168.200.0/20
                  provider: zscaler-ipsec
                  region: auto
                  vars_only: false
            schema:
              properties:
                latlng:
                  description: by default, we'll use the Site lat/lng
                  properties:
                    lat:
                      example: 37.295833
                      type: number
                    lng:
                      example: -122.032946
                      type: number
                  type: object
                name:
                  example: tunnel-name
                  type: string
                num_users:
                  description: 'JSE only, overwrite the # of tunnel users configured
                    at Site setting'
                  example: 100
                  type: integer
                primary:
                  properties:
                    num_hosts:
                      description: 1 for JSE, supports 1 primary, 1 secondary
                      example: 1
                      type: integer
                    wan_names:
                      description: optional, only needed if `vars_only`==`false`
                      items:
                        example: wan0
                        type: string
                      type: array
                  required:
                  - num_hosts
                  type: object
                protected_net:
                  description: JSE only
                  example: 192.168.200.0/20
                  type: string
                provider:
                  enum:
                  - zscaler-ipsec
                  - zscaler-gre
                  - jse-ipsec
                  example: jse-ipsec
                  type: string
                region:
                  default: auto
                  enum:
                  - auto
                  - EMEA
                  - Americas
                  - APAC
                  example: auto
                  type: string
                secondary:
                  nullable: true
                  properties:
                    num_hosts:
                      description: 1 for JSE, supports 1 primary, 1 secondary
                      type: integer
                    wan_names:
                      description: optional, only needed if `vars_only`==`false`
                      items:
                        type: string
                      type: array
                  required:
                  - num_hosts
                  type: object
                vars_only:
                  default: false
                  description: if false, we'd generate the config inline
                  type: boolean
              required:
              - provider
              - name
              type: object
              x-examples:
                Example 1:
                  latlng:
                    lat: 37.295833
                    lng: -122.032946
                  name: tunnel-name
                  num_users: 100
                  primary:
                    num_hosts: 2
                    wan_names:
                    - wan0
                    - wan1
                  protected_net: 192.168.200.0/20
                  provider: zscaler-ipsec
                  region: auto
                  secondary: null
                  vars_only: true
      responses:
        '200':
          content:
            application/json:
              examples:
                JSE:
                  value:
                    vars:
                      JSE_IPSEC_LOCAL_ID: local_id
                      JSE_IPSEC_PRIMARY_HOST_1_TUNNEL-NAME: host1
                      JSE_IPSEC_PSK: psk
                      JSE_IPSEC_SECONDARY_HOST_1_TUNNEL-NAME: host2
                Zscaler:
                  value:
                    vars:
                      ZSCALER_IPSEC_LOCAL_ID: local_id
                      ZSCALER_IPSEC_PRIMARY_HOST_1_TUNNEL-NAME: host1
                      ZSCALER_IPSEC_PRIMARY_HOST_2_TUNNEL-NAME: host2
                      ZSCALER_IPSEC_PSK: psk
              schema:
                oneOf:
                - properties:
                    vars:
                      additionalProperties:
                        type: string
                      properties:
                        ZSCALER_IPSEC_LOCAL_ID:
                          example: local_id
                          type: string
                        ZSCALER_IPSEC_PSK:
                          example: local_id
                          type: string
                      type: object
                - properties:
                    vars:
                      additionalProperties:
                        type: string
                      properties:
                        JSE_IPSEC_LOCAL_ID:
                          example: local_id
                          type: string
                        JSE_IPSEC_PSK:
                          example: psk
                          type: string
                      type: object
                type: object
          description: OK
        '400':
          content:
            application/json:
              schema:
                properties: {}
                type: object
          description: The API endpoint exists but its syntax/payload is incorrect,
            detail may be given
        '401':
          content:
