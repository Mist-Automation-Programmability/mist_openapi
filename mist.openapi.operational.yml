              accept: true
              community:
              - '65003:10'
              exclude_as_path:
              - '65002'
              export_communitites:
              - string
              local_preference: string
              prepend_as_path:
              - '65003'
            matching:
              as_path:
              - '65001'
              community:
              - '65001:2'
              network:
              - string
              prefix:
              - 192.168.0.0/16-30
              protocol:
              - direct
              route_exists:
                route: 192.168.0.0/24
                vrf_name: default
