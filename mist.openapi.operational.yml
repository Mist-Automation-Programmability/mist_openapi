    parameters:
    - $ref: '#/components/parameters/org_id'
    post:
      description: "It\u2019s a common request we get from the customers. When a AP\
        \ HW has problem and need a replacement, they would want to copy the existing\
        \ attributes (Device Config) of this old AP to the new one. It can be done\
        \ by providing the MAC of a device that\u2019s currently in the inventory\
        \ but not assigned. The Device replaced will become unassigned.\n\n**Note:**\
        \ For Gateway devices only like-for-like replacements (can only replace a\
        \ SRX320 with a SRX320 and not some otehr model) are allowed."
      operationId: replaceOrgDevices
      requestBody:
        content:
          application/json:
            examples:
              example-1:
                value:
                  discard: []
                  inventory_mac: 5c5b35000301
                  mac: 5c5b35000101
                  site_id: 4ac1dcf4-9d8b-7211-65c4-057819f0862b
            schema:
              properties:
                discard:
                  description: "attributes that you don\u2019t want to copy"
                  items:
                    type: string
                  type: array
                inventory_mac:
                  description: mac of the inventory that will be replacing the old
                    one. It has to be claimed and unassigned.
                  type: string
                mac:
                  description: device mac
                  type: string
                site_id:
                  description: the site_id of the device to be replaced
                  format: uuid
                  type: string
              required:
              - inventory_mac
              - mac
              - site_id
