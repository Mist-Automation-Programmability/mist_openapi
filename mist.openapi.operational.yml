          type: string
        template_id:
          format: uuid
          nullable: true
          type: string
        thumbnail:
          description: Url of portal background image thumbnail
          format: uri
          nullable: true
          type: string
        use_eapol_v1:
          default: false
          description: "if `auth.type`==\u2019eap\u2019 or \u2018psk\u2019, should\
            \ only be set for legacy client, such as pre-2004, 802.11b devices"
          type: boolean
        vlan_enabled:
          default: false
          description: if vlan tagging is enabled
          type: boolean
        vlan_id:
          maximum: 4094
          minimum: 1
          nullable: true
          type: integer
        vlan_ids:
          description: list of VLAN ids
          items:
            maximum: 4094
            minimum: 1
            nullable: true
            type: integer
          type: array
        vlan_pooling:
          default: false
          description: vlan pooling allows AP to place client on different VLAN using
