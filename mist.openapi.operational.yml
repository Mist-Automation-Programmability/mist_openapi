                format: ipv4
                type: string
              ip_end:
                format: ipv4
                type: string
              ip_start:
                format: ipv4
                type: string
              servers:
                items:
                  format: ipv4
                  type: string
                type: array
              type:
                default: local
                enum:
                - local
                - relay
                type: string
            type: object
          description: The property key is the network name
          type: object
        extra_routes:
          additionalProperties:
            description: The property key is a CIDR or name from `networks`
            properties:
              via:
                format: ipv4
                type: string
            type: object
          type: object
        gateway_matching:
          $ref: '#/components/schemas/template_gateway.matching'
        id:
