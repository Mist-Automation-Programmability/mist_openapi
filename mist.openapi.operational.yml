                failed:
                - 438f6eca-6276-4993-bfeb-53cabbba6f08
                reboot_in_progress:
                - 437f6eca-6276-4993-bfeb-53ccbbba6f08
                rebooted:
                - 436f6eca-6276-4993-bfeb-53cebbba6f08
                skipped:
                - 435f6eca-6276-4993-bfeb-53cfbbba6f08
