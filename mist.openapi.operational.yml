        org_id:
          format: uuid
          readOnly: true
          type: string
        path_preferences:
          additionalProperties:
            description: The property key is the path name
            properties:
              paths:
                properties:
                  cost:
                    type: integer
                  gateway_ip:
                    description: if `type`==`local`, if a different gateway is desired
                    type: string
                  internet_access:
                    default: false
                    description: when `type`==`vpn`, if this vpn path can be used
