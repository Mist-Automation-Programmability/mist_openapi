          properties:
            port_mirror:
              $ref: '#/components/schemas/junos_port_mirror'
          type: object
        port_usages:
          additionalProperties:
            $ref: '#/components/schemas/junos_port_usages'
          description: The property key is the port profile name
          properties:
            dynamic:
              $ref: '#/components/schemas/junos_port_usages_dynamic'
          type: object
        radius_config:
          $ref: '#/components/schemas/junos_radius_config'
        role:
          default: access
          enum:
          - access
          - aggregation
          type: string
        router_id:
          description: used for OSPF / BGP / EVPN
          example: 10.2.1.10
          type: string
        site_id:
          format: uuid
          readOnly: true
          type: string
        switch_mgmt:
          properties:
            config_revert_timer:
              default: 10
              description: rollback timer for commit confirmed
              maximum: 30
              minimum: 1
              type: integer
            protect_re:
              description: "restrict inbound-traffic to host\nwhen enabled, all traffic\
                \ that is not essential to our operation will be dropped \ne.g. ntp\
                \ / dns / traffic to mist will be allowed by default, if dhcpd is\
                \ enabled, we'll make sure it works"
              properties:
                allowed_services:
                  description: optionally, services we'll allow
                  items:
                    example: e
                    type: string
                  type: array
                custom:
                  items:
                    properties:
                      port_range:
                        default: '0'
                        example: 80,1035-1040
                        type: string
                      protocol:
                        default: any
                        enum:
                        - tcp
                        - udp
                        - icmp
                        - any
                        example: tcp
                        type: string
                      subnets:
                        items:
                          example: 10.1.2.0/24
                          type: string
                        type: array
                    type: object
                  type: array
                enabled:
                  type: boolean
                trusted_hosts:
                  description: optionally, host/subnets we'll allow traffic to/from
                  items:
                    example: 10.242.3.0/24
