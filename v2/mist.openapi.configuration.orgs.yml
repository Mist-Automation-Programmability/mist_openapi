    post:
      description: Upgrade Mist Edges
      operationId: upgradeOrgMxEdges
      requestBody:
        content:
          application/json:
            examples:
              example-1:
                value:
                  channel: stable
                  mxedge_ids:
                  - 387804a7-3474-85ce-15a2-f9a9684c9c90
                  versions:
                    mxagent: current
                    tunterm: default
            schema:
              properties:
                allow_downgrades:
                  description: whether downgrade is allowed when running version is
                    higher than expected version for each service
                  properties:
                    mxagent:
                      default: false
                      type: boolean
                    mxdas:
                      default: false
                      type: boolean
                    mxocproxy:
                      default: false
                      type: boolean
                    radsecproxy:
                      default: false
                      type: boolean
                    tunterm:
                      default: false
                      type: boolean
                  type: object
                channel:
                  default: stable
                  description: upgrade channel to follow, stable (default) / beta
                    / alpha
                  enum:
                  - stable
                  - beta
                  - alpha
                  type: string
                distro:
                  description: distro upgrade, optional, to specific codename (e.g.
                    bullseye) with highest qualified versions
                  type: string
                mxedge_ids:
                  description: list of mxedge IDs to upgrade. If not specified, it
                    means all the org mxedges.
                  items:
                    format: uuid
                    type: string
                  type: array
                strategy:
                  default: big_bang
                  description: '* `big_bang`: upgrade all at once

                    * `serial`: one at a time

                    '
                  enum:
                  - big_bang
                  - serial
                  type: string
                versions:
                  description: version to upgrade for each service, optional (ignored
                    if distro upgrade)
                  properties:
                    mxagent:
                      type: string
                    mxdas:
                      type: string
                    mxocproxy:
                      type: string
                    radsecproxy:
                      type: string
                    tunterm:
                      type: string
                  required:
                  - mxagent
                  - tunterm
                  type: object
              required:
              - mxedge_ids
              type: object
        description: Request Body
      responses:
        '200':
          $ref: '#/components/responses/OK'
        '400':
          $ref: '#/components/responses/HTTP400'
        '401':
          $ref: '#/components/responses/HTTP401'
        '403':
          $ref: '#/components/responses/HTTP403'
        '404':
          $ref: '#/components/responses/HTTP404'
        '429':
          $ref: '#/components/responses/HTTP429'
      summary: upgradeOrgMxEdges
      tags:
      - Orgs Devices Upgrades
      - Configuration
