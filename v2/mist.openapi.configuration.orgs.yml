    mxedge_das:
      description: configure cloud-assisted dynamic authorization service on this
        cluster of mist edges
      properties:
        coa_servers:
          description: dynamic authorization clients configured to send CoA|DM to
            mist edges on port 3799
          items:
            properties:
              disable_event_timestamp_check:
                default: false
                description: whether to disable Event-Timestamp Check
                type: boolean
              enabled:
                type: boolean
              host:
                description: this server configured to send CoA|DM to mist edges
                type: string
              port:
                default: 3799
                description: mist edges will allow this host on this port
                type: integer
              secret:
                type: string
            type: object
          type: array
        enabled:
          default: false
          type: boolean
      type: object
      x-examples:
        example-1:
          coa_servers:
          - disable_event_timestamp_check: false
            enabled: false
            host: aaa.internal
            port: 3799
            secret: testing456
          enabled: true
    mxedge_mgmt:
      properties:
        mist_password:
          type: string
        root_password:
          type: string
      title: mxedge_mgmt
      type: object
    mxedge_upgrade_response:
      description: ''
      properties:
        channel:
          minLength: 1
          type: string
        counts:
          properties:
            failed:
              type: integer
            queued:
              type: integer
            success:
              type: integer
            upgrading:
              type: integer
          required:
          - queued
          - upgrading
          - success
          - failed
          type: object
        id:
          minLength: 1
          type: string
        status:
          minLength: 1
          type: string
        strategy:
          minLength: 1
          type: string
        versions:
          type: object
      required:
      - status
      - strategy
      - versions
      - channel
      - id
      - counts
      type: object
      x-examples:
        example-1:
          channel: stable
          counts:
            failed: 0
            queued: 1
            success: 0
            upgrading: 1
          id: ceef2c8a-e2e6-447a-8b27-cb4f3ec1adae
          status: upgrading
          strategy: serial
          versions: {}
    mxtunnel:
      description: MxTunnel
      properties:
        anchor_mxtunnel_ids:
          description: list of anchor mxtunnels used for forming edge to edge tunnels
          items:
            example: 1e970fec-0a7a-4d73-a472-3ef3b6a456aa
            format: uuid
            type: string
          type: array
        auto_preemption:
          properties:
            day_of_week:
              enum:
              - any
              - mon
              - tue
              - wed
              - thu
              - fri
              - sat
              - sun
              type: string
            enabled:
              description: whether auto preemption should happen
              type: boolean
            time_of_day:
              description: any / HH:MM (24-hour format). Preemption will happen within
                15 mins of this time
              type: string
          type: object
        created_time:
          readOnly: true
          type: number
        for_site:
          readOnly: true
          type: boolean
        hello_interval:
          default: 60
          description: in seconds, used as heartbeat to detect if a tunnel is alive.
            AP will try another peer after missing N hellos specified by `hello_retries`.
