            schema:
              properties:
                auto_deviceprofile_assignment:
                  default: false
                  description: whether to auto assign device to deviceprofile by name
                  type: boolean
                csv:
                  description: csv file for ap name mapping, optional
                  format: binary
                  type: string
                file:
                  format: binary
                  type: string
                json:
                  properties:
                    import_all_floorplans:
                      default: false
                      type: boolean
                    import_height:
                      default: true
                      type: boolean
                    import_orientation:
                      default: true
                      type: boolean
                    site_id:
                      format: uuid
                      type: string
                    vendor_name:
                      enum:
                      - ekahau
                      - ibwave
                      type: string
                  required:
                  - vendor_name
                  - site_id
                  type: object
              type: object
        description: ''
      responses:
        '200':
          content:
            application/json:
              examples:
