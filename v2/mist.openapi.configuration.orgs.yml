  /api/v1/register/verify/{token}:
    parameters:
    - $ref: '#/components/parameters/token'
    post:
      description: Verify registration
      operationId: verifyRegistration
      responses:
        '200':
          content:
            application/json:
              examples:
                Response if successful:
                  value:
                    return_to: http://mist.zendesk.com/hc/quickstart.pdf
                Response if successful but failed to apply the invitation automatically:
                  value:
                    detail: password policy not met
                    invite_not_applied: true
                    min_length: 8
              schema:
                properties:
                  detail:
                    type: string
                  invite_not_applied:
                    type: boolean
                  min_length:
                    type: integer
                  return_to:
                    type: string
                type: object
          description: OK
          headers:
            Set-Cookie:
              schema:
                example: csrftoken=vwvBuq9qkqaKh7lu8tNc0gkvBfEaLAmx; expires=Tue,
                  15-Mar-2016 19:47:20 GMT; Max-Age=31449600; Path=/
                type: string
        '400':
          content:
            application/json:
              examples:
                already registered:
                  value:
                    detail: already registered
                verification expired:
                  value:
                    detail: expired
              schema:
                properties:
                  detail:
                    type: string
                required:
                - detail
                type: object
          description: Response if verification expired or already registered
        '401':
          content:
            application/json:
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
              schema:
                properties:
                  detail:
                    type: string
                type: object
          description: Unauthorized
        '403':
          content:
            application/json:
              examples:
                Permission Denied:
                  value:
                    detail: You do not have permission to perform this action.
              schema:
                properties:
                  detail:
                    type: string
                type: object
          description: Permission Denied
        '404':
          content:
            application/json:
              examples:
                example-1:
                  value:
                    detail: Not found.
              schema:
                properties:
                  detail:
                    type: string
                required:
                - detail
                type: object
          description: Response if secret is invalid
      summary: verifyRegistration
      tags:
      - Orgs Admins
      - Configuration
components:
  parameters:
    admin_id:
      in: path
      name: admin_id
      required: true
      schema:
        example: 000000ab-00ab-00ab-00ab-0000000000ab
        format: uuid
        type: string
    alarm_id:
      in: path
      name: alarm_id
      required: true
