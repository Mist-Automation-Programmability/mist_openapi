        api_key:
          description: API Key
          example: aHhlbGxvYXNkZmFzZGZhc2Rmc2RmCg=="
          type: string
        console_url:
          description: console URL
          example: https://hs1.airwatchportals.com
          type: string
        enabled:
          type: boolean
        password:
          description: password
          example: user1
          type: string
        username:
          description: username
          example: test123
          type: string
      type: object
      x-examples:
        Example 1:
          api_key: aHhlbGxvYXNkZmFzZGZhc2Rmc2RmCg=="
          console_url: https://hs1.airwatchportals.com
          enabled: true
          password: user1
          username: test123
    wlan_app_qos:
      description: app qos wlan settings
      properties:
        apps:
          additionalProperties:
            properties:
              dscp:
                type: integer
              dst_subnet:
                description: subnet filter is not required but helps AP to only inspect
                  certain traffic (thus reducing AP load)
                type: string
              src_subnet:
                description: subnet filter is not required but helps AP to only inspect
                  certain traffic (thus reducing AP load)
                type: string
            type: object
          example:
            skype-business-video:
              dscp: 32
              dst_subnet: 10.2.0.0/16
              src_subnet: 10.2.0.0/16
          type: object
        enabled:
          type: boolean
        others:
          items:
            properties:
              dscp:
                example: 32
                type: integer
              dst_subnet:
                example: 10.2.0.0/16
                type: string
              port_ranges:
                example: 80,1024-6553
                type: string
              protocol:
                example: udp
                type: string
              src_subnet:
                example: 10.2.0.0/16
                type: string
            type: object
          minItems: 1
          type: array
          uniqueItems: true
      type: object
      x-examples:
        Example:
          apps:
            skype-business-video:
              dscp: 32
              dst_subnet: 10.2.0.0/16
              src_subnet: 10.2.0.0/16
          enabled: true
          others:
          - dscp: 0
            dst_subnet: 10.2.0.0/16
            port_ranges: 80,1024-6553
            protocol: udp
            src_subnet: 10.2.0.0/16
    wlan_auth:
      description: authentication wlan settings
      properties:
        anticlog_threshold:
          default: 16
          description: SAE anti-clogging token threshold
          example: 16
          maximum: 32
          minimum: 16
          type: integer
        eap_reauth:
          default: false
          description: whether to trigger EAP reauth when the session ends
          type: boolean
        enable_mac_auth:
          default: false
          description: whether to enable MAC Auth, uses the same auth_servers
          type: boolean
        key_idx:
          default: 1
          description: when type=wep
          maximum: 4
          minimum: 1
          type: integer
        keys:
          description: when type=wep, four 10-character or 26-character hex string,
            null can be used. All keys, if provided, have to be in the same length
          items:
            nullable: true
