          example: note for mxedge
          type: string
        ntp_servers:
          items:
            type: string
          type: array
        oob_ip_config:
          description: ip configuration of the Mist Edge out-of-band management interface
          properties:
            dns:
              default:
              - 8.8.8.8
              - 8.8.4.4
              description: if `type`=`static`
              example:
              - 8.8.8.8
              - 4.4.4.4
              - 2001:4860:4860::8888
              items:
                type: string
              type: array
            gateway:
              description: if `type`=`static`
              example: 10.2.1.254
              type: string
            gateway6:
              example: 2601:1700:43c0:dc0::1
              type: string
            ip:
              description: if `type`=`static`
              example: 10.2.1.2
              type: string
            ip6:
              example: 2601:1700:43c0:dc0:20c:29ff:fea7:93bc
              type: string
            netmask:
              description: if `type`=`static`
              example: 255.255.255.0
              type: string
            netmask6:
              example: /64
              type: string
            type:
              default: dhcp
              enum:
              - static
              - dhcp
              example: static
              type: string
            type6:
              enum:
              - static
              - dhcp
              example: static
              type: string
          type: object
        org_id:
          format: uuid
          readOnly: true
          type: string
        proxy:
          properties:
            url:
              description: Proxy Configuration to talk to Mist
              example: http://proxy.internal:8080/
              type: string
          type: object
        services:
          description: list of services to run, tunterm only for now
          items:
            default: tunterm
            type: string
          type: array
        site_id:
          format: uuid
          readOnly: true
          type: string
        tunterm_dhcpd_config:
          additionalProperties:
            properties:
              enabled:
                default: false
                type: boolean
              servers:
                description: list of DHCP servers; required if `type`==`relay`
                items:
                  type: string
                type: array
              type:
                default: relay
                enum:
                - relay
                type: string
            type: object
          description: global and per-VLAN. The property key is the VLAN ID
          properties:
            enabled:
              default: false
              type: boolean
            servers:
              description: list of DHCP servers; required if `type`==`relay`
              items:
                type: string
              type: array
            type:
              default: relay
              enum:
              - relay
              type: string
          type: object
        tunterm_extra_routes:
          additionalProperties:
            properties:
              via:
                type: string
            type: object
          description: The property key is a CIDR
          type: object
        tunterm_igmp_snooping_config:
          properties:
            enabled:
              default: false
              type: boolean
            querier:
              properties:
                max_response_time:
                  description: "querier\u2019s query response interval, in tenths-of-seconds"
                  example: 10
                  type: integer
                mtu:
                  description: the MTU we use (needed when forming large IGMPv3 Reports)
                  example: 1500
                  type: integer
                query_interval:
                  description: "querier\u2019s query interval, in seconds"
                  example: 125
                  type: integer
                robustness:
                  description: "querier\u2019s robustness "
                  maximum: 7
                  minimum: 1
                  type: integer
                version:
                  description: "querier\u2019s maximum protocol version"
                  example: 3
                  type: integer
              type: object
            vlan_ids:
              description: the list of vlans on which tunterm performs IGMP snooping
              items:
                example: 2
                type: integer
              type: array
          type: object
        tunterm_ip_config:
          description: ip configuration of the Mist Tunnel interface
          properties:
            gateway:
              example: 10.2.1.254
              type: string
            ip:
              description: untagged VLAN
              example: 10.2.1.1
              type: string
            netmask:
              example: 255.255.255.0
              type: string
          required:
          - gateway
          - ip
          - netmask
          type: object
        tunterm_monitoring:
          items:
            $ref: '#/components/schemas/site_tunterm_monitoring'
          type: array
        tunterm_other_ip_configs:
          additionalProperties:
            properties:
              ip:
                type: string
              netmask:
                type: string
            required:
            - ip
            - netmask
            type: object
          description: ip configs by VLAN ID. The property key is the VLAN ID
          type: object
        tunterm_port_config:
          description: ethernet port configurations
          properties:
            downstream_ports:
              description: list of ports to be used for downstream (to AP) purpose
              items:
                type: string
              type: array
            separate_upstream_downstream:
              default: false
              description: weather to separate upstream / downstream ports. default
                is false where all ports will be used.
              type: boolean
            upstream_port_vlan_id:
              default: 1
              description: native VLAN id for upstream ports
              example: 30
              type: integer
            upstream_ports:
              description: list of ports to be used for upstrea purpose (to LAN)
              items:
                type: string
              type: array
          type: object
        tunterm_registered:
          readOnly: true
          type: boolean
        tunterm_switch_config:
          additionalProperties:
            properties:
              port_vlan_id:
                type: integer
              vlan_ids:
                items:
                  anyOf:
                  - type: integer
                  - type: string
                type: array
            type: object
          description: if custom vlan settings are desired
          properties:
            enabled:
              type: boolean
          type: object
        versions:
