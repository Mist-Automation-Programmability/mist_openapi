                    summary:
                      num_ap_assigned: 1
                      num_inv_assigned: 1
                      num_map_assigned: 1
              schema:
                description: ''
                properties:
                  aps:
                    items:
                      properties:
                        action:
                          enum:
                          - placed
                          - assigned-placed
                          - named-placed
                          - assigned-named-placed
                          - ignored
                          minLength: 1
                          type: string
                        floorplan_id:
                          minLength: 1
                          type: string
