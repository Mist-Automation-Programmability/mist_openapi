    junos_acl_policies:
      description: '- for GBP-based policy, all src_tags and dst_tags have to be gbp-based

        - for ACL-based policy, `network` is required in either the source or destination
        so that we know where to attach the policy to'
      properties:
        actions:
          description: '- for GBP-based policy, all src_tags and dst_tags have to
            be gbp-based

            - for ACL-based policy, `network` is required in either the source or
            destination so that we know where to attach the policy to'
          items:
            properties:
              action:
                enum:
                - allow
                - deny
                example: deny
                type: string
              dst_tag:
                example: corp
                type: string
            type: object
          type: array
        name:
          example: guest access
          type: string
        src_tags:
          description: '- for GBP-based policy, all src_tags and dst_tags have to
            be gbp-based

            - for ACL-based policy, `network` is required in either the source or
            destination so that we know where to attach the policy to'
          items:
            example: macs
            type: string
          type: array
      type: object
      x-examples:
        Example 1:
          action: allow
          dst_tags:
          - printer
          name: guest access to printer
          src_tags:
          - guest
      x-stoplight:
        id: 78da34fa64a5f
    junos_acl_tags:
      properties:
        gbp_tag:
          description: 'required if

            - `type`==`dynamic_gbp` (gbp_tag received from RADIUS)

            - `type`==`static_gbp` (applying gbp tag against matching conditions)'
          type: number
        macs:
          description: "required if \n- `type`==`mac`\n- `type`==`static_gbp` if from\
            \ matching mac"
          items:
            type: string
          type: array
        network:
          description: 'if:

            - `type`==`mac` (optional. default is `any`)

            - `type`==`subnet` (optional. default is `any`)

            - `type`==`network`

            - `type`==`resource` (optional. default is `any`)

            - `type`==`static_gbp` if from matching network (vlan)'
          type: string
        radius_group:
          description: "required if \n- `type`==`radius_group` \n- `type`==`static_gbp`\
            \ if from matching radius_group"
          type: string
        specs:
          description: 'if `type`==`resource`

            empty means unrestricted, i.e. any'
          items:
            properties:
              port_range:
                default: 0
                description: matched dst port, "0" means any
                type: integer
              protocol:
                default: any
                description: '`tcp` / `udp` / `icmp` / `gre` / `any` / `:protocol_number`.
                  `protocol_number` is between 1-254'
                type: string
            type: object
          type: array
        subnets:
          description: "if \n- `type`==`subnet` \n- `type`==`resource` (optional.\
            \ default is `any`)\n- `type`==`static_gbp` if from matching subnet"
          items:
            type: string
          type: array
        type:
          enum:
          - mac
          - subnet
          - network
          - radius_group
          - any
          - resource
          - dynamic_gbp
          - static_gbp
          type: string
      required:
      - type
      type: object
      x-examples:
        any:
          type: any
        dynamic_gbp:
          gbp_tag: 100
          type: dynamic_gbp
        mac:
          macs:
          - '010203040506'
          - abcdef*
          network: iot
          type: mac
        network:
          network: guest
          type: network
        radius_group:
          radius_group: VIP
          type: radius_group
        resource:
          network: dmz
          specs:
          - port_range: 80
            protocol: tcp
          subnets:
          - 192.168.0.5
          type: resource
        static_gbp:
          gbp_tag: 100
          macs:
          - '010203040506'
          - abcdef*
          network: employee
          radius_group: VIP
          subnets:
          - 192.168.0.0/16
          type: static_gbp
        subnet:
          network: lan
          subnets:
          - 192.168.1.30/32
          type: subnet
