                    one. It has to be claimed and unassigned.
                  type: string
                mac:
                  description: device mac
                  type: string
                site_id:
                  description: the site_id of the device to be replaced
                  format: uuid
                  type: string
              required:
              - inventory_mac
              - mac
              - site_id
              type: object
        description: Request Body
      responses:
