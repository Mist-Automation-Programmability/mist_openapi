        location:
          example: Las Vegas, NV
          type: string
        name:
          example: TGH-1K-QFX10K
          type: string
        network:
          default: default
          type: string
        trap_groups:
          items:
            properties:
              categories:
                items:
                  example: authentication
                  type: string
                type: array
              group_name:
                description: Categories list can refer to https://www.juniper.net/documentation/software/topics/task/configuration/snmp-trap-groups-configuring-junos-nm.html
                example: profiler
                type: string
              targets:
                items:
                  example: 172.29.158.19
                  type: string
                type: array
              version:
                default: v2
                enum:
                - v1
                - v2
                - all
                type: string
            type: object
          type: array
        v2c_config:
          items:
            properties:
              authorization:
                example: read-only
