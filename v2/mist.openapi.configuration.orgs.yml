        for_site:
          readOnly: true
          type: boolean
        headers:
          description: 'custom headers : the headers name and value must be string,
            total bytes of headers name and value must be less than 1000'
          nullable: true
          type: object
        id:
          format: uuid
          readOnly: true
          type: string
        modified_time:
          readOnly: true
          type: number
        name:
