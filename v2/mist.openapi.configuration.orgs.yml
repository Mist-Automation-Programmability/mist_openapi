    post:
      description: In certain situations, for example, scheduled maintanance, you
        may want to suspend alarms to be triggered for a period of time.
      operationId: suppressOrgAlarm
      requestBody:
        content:
          application/json:
            schema:
              properties:
                applies:
                  description: Object defines the scope (within the org e.g. whole
                    org, and/or some site-groups, and/or some sites) for which the
                    alarm service has to be suppressed for some `duration`
                  properties:
                    org_id:
                      description: UUID of the current org (if provided, the alarms
                        will be suppressed at org level)
                      format: uuid
                      minLength: 1
                      type: string
                    site_ids:
                      description: List of UUID of the sites within the org (if provided,
                        the alarms will be suppressed for all the mentioned sites
                        under the org)
                      items:
                        format: uuid
                        type: string
                      type: array
                    sitegroup_ids:
                      description: List of UUID of the site groups within the org
                        (if provided, the alarms will be suppressed for all the sites
                        under those site groups)
                      items:
                        format: uuid
                        type: string
                      type: array
                  required:
                  - org_id
                  - site_ids
                  - sitegroup_ids
                  type: object
                duration:
                  default: 3600
                  description: duration, in seconds. Maximum duration is 86400 * 180
                    (180 days). 0 is to un-suppress alarms
                  maximum: 15552000
                  minimum: 0
                  type: number
                scheduled_time:
                  description: poch_time in seconds, Default as now, accepted time
                    range is from now to now + 7 days
                  type: integer
              required:
              - applies
              type: object
              x-examples:
                example-1:
                  applies:
                    org_id: 2818e386-8dec-2562-9ede-5b8a0fbbdc71
                    site_ids:
                    - 4ac1dcf4-9d8b-7211-65c4-057819f0862b
                    sitegroup_ids:
                    - 581328b6-e382-f54e-c9dc-999983183a34
                    - f57096b9-0c2f-4df6-c77b-ae6ae87a3d43
                  duration: 60
      responses:
        '200':
          $ref: '#/components/responses/OK'
        '400':
          $ref: '#/components/responses/HTTP400'
        '401':
          $ref: '#/components/responses/HTTP401'
        '403':
          $ref: '#/components/responses/HTTP403'
        '404':
          $ref: '#/components/responses/HTTP404'
        '429':
          $ref: '#/components/responses/HTTP429'
      summary: suppressOrgAlarm
      tags:
      - Orgs Alarm Templates
      - Configuration
