    mxcluster:
      description: mxCluster
      properties:
        created_time:
          readOnly: true
          type: number
        for_site:
          readOnly: true
          type: boolean
        id:
          format: uuid
          readOnly: true
          type: string
        mist_das:
          $ref: ./components/schemas/mxedge_das.yaml
        mist_nac:
          $ref: ./components/schemas/mxcluster_nac.yaml
        modified_time:
          readOnly: true
          type: number
        name:
          type: string
        org_id:
          format: uuid
          readOnly: true
          type: string
        proxy:
          description: Proxy Configuration to talk to Mist
          properties:
            url:
              example: http://proxy.corp.com:8080/
              type: string
          type: object
        radsec:
          $ref: ./components/schemas/mxcluster_radsec.yaml
        radsec_tls:
          properties:
            keypair:
              type: string
          type: object
        site_id:
          format: uuid
          readOnly: true
          type: string
        tunterm_ap_subnets:
          description: list of subnets where we allow AP to establish Mist Tunnels
            from
          items:
            type: string
          type: array
        tunterm_dhcpd_config:
          additionalProperties:
            properties:
              enabled:
                default: false
                type: boolean
              servers:
                items:
                  type: string
                type: array
              type:
                default: relay
                enum:
                - relay
                type: string
            type: object
          description: DHCP server/relay configuration of Mist Tunneled VLANs. Property
            key is the VLAN ID
          properties:
            enabled:
              default: false
              type: boolean
            servers:
              items:
                type: string
              type: array
            type:
              default: relay
              enum:
              - relay
              type: string
          type: object
        tunterm_extra_routes:
          additionalProperties:
            properties:
              via:
                type: string
            type: object
          description: extra routes for Mist Tunneled VLANs. Property key is a CIDR
          type: object
        tunterm_hosts:
          description: hostnames or IPs where a Mist Tunnel will use as the Peer (i.e.
            they are reachable from AP)
          items:
            type: string
          type: array
        tunterm_hosts_order:
          description: list of index of tunterm_hosts
          items:
            type: integer
          type: array
        tunterm_hosts_selection:
          default: shuffle
          description: "Ordering of tunterm_hosts for mxedge within the same mxcluster.\
            \ \n* When `shuffle`, the ordering of tunterm_hosts is randomized by the\
            \ device\u2019s MAC. \n* When `shuffle-by-site`, we shuffle by site_id+tunnel_id\
            \ (so when client connects to a specific Tunnel, it will go to the same\
            \ (order of) mxedge, and we load-balancing between tunnels). \n* When\
            \ `ordered`, the order is decided by tunterm_hosts_order"
          enum:
          - shuffle
          - shuffle-by-site
          - ordered
          type: string
        tunterm_monitoring:
          items:
            $ref: ./components/schemas/site_tunterm_monitoring.yaml
          type: array
        tunterm_monitoring_disabled:
          type: boolean
      type: object
      x-examples:
        example-1:
          value:
            created_time: 0
            for_site: true
            id: 445f6eca-6276-4993-bfeb-53c3bbba6f48
            modified_time: 0
            name: string
            org_id: a40f5d1f-d889-42e9-94ea-b9b33585fc6b
            radsec:
              acct_servers:
              - host: string
                port: 1813
                secret: string
              auth_servers:
              - host: string
                port: 1812
                secret: string
              enabled: true
              server_selection: ordered
            radsec_tls:
              keypair: string
            site_id: 72771e6a-6f5e-4de4-a5b9-1266c4197811
            tunterm_ap_subnets:
            - string
            tunterm_dhcpd_config:
              enabled: false
              property1:
                enabled: false
                servers:
                - string
                type: relay
              property2:
                enabled: false
                servers:
                - string
                type: relay
              servers:
              - string
              type: relay
            tunterm_extra_routes:
              property1:
                via: string
              property2:
                via: string
            tunterm_hosts:
            - string
            tunterm_monitoring:
            - host: string
              port: 0
              protocol: arp
              timeout: 300
    mxcluster_nac:
      properties:
        acct_server_port:
          default: 1813
          type: integer
        auth_server_port:
          default: 1812
          type: integer
        client_ips:
          additionalProperties:
            description: Property key is the RADIUS Client IP/Subnet.
            properties:
              secret:
                description: if different from above
                type: string
              site_id:
                description: present only for 3rd party clients
                example: 00000000-0000-0000-1234-000000000000
                format: uuid
                type: string
              vendor:
                description: 'convention to be followed is : "<vendor>-<variant>"

                  <variant> could be an os/platform/model/company

                  for ex: for cisco vendor, there could variants wrt os (such as ios,
                  nxos etc), platforms (asa etc), or acquired companies (such as meraki,
                  airnonet) etc.'
                enum:
                - generic
                - juniper
                - aruba
                - paloalto
                - cisco-aironet
                - cisco-ios
                - cisco-meraki
                example: cisco-ios
                type: string
            type: object
          type: object
        enabled:
          type: boolean
        secret:
          example: testing123
          type: string
      type: object
      x-examples:
        example-1:
          acct_server_port: 1813
          auth_server_port: 1812
          client_ips:
            property1:
              secrect: string
              vendor: string
            property2:
              secrect: string
              vendor: string
          enabled: true
          secret: string
    mxcluster_radsec:
      description: MxEdge Radsec Configuration
      properties:
        acct_servers:
          description: list of RADIUS accounting servers, optional, order matters
            where the first one is treated as primary
          items:
            properties:
              host:
                description: ip / hostname of RADIUS server
                type: string
              port:
                default: 1813
                description: Acct port of RADIUS server
                type: integer
              secret:
                description: secret of RADIUS server
                type: string
              ssids:
                description: list of ssids that will use this server if match_ssid
                  is true and match is found
                items:
                  type: string
                type: array
            type: object
          type: array
          uniqueItems: true
        auth_servers:
          description: list of RADIUS authentication servers, order matters where
            the first one is treated as primary
          items:
            properties:
              host:
                description: ip / hostname of RADIUS server
                type: string
              keywrap_enabled:
                description: if used for Mist APs, enable keywrap algorithm. Default
                  is false
                type: boolean
              keywrap_format:
                description: if used for Mist APs
                enum:
                - hex
                - ascii
                type: string
              keywrap_kek:
                description: if used for Mist APs, encryption key
                type: string
              keywrap_mack:
                description: if used for Mist APs, Message Authentication Code Key
                type: string
              port:
                default: 1812
                description: Auth port of RADIUS server
                type: integer
              secret:
                description: secret of RADIUS server
                type: string
              ssids:
                description: list of ssids that will use this server if match_ssid
                  is true and match is found
                items:
                  type: string
                type: array
            type: object
          type: array
          uniqueItems: true
        enabled:
          description: whether to enable service on Mist Edge i.e. RADIUS proxy over
            TLS
          type: boolean
        match_ssid:
          description: whether to match ssid in request message to select from a subset
            of RADIUS servers
          type: boolean
        proxy_hosts:
          description: hostnames or IPs for Mist AP to use as the TLS Server (i.e.
            they are reachable from AP) in addition to `tunterm_hosts`
          items:
            type: string
          type: array
        server_selection:
          default: ordered
          description: ordered (default) / unordered. When ordered, Mist Edge will
            prefer and go back to the first radius server if possible
          enum:
          - ordered
          - unordered
          type: string
        source:
          default: any
          description: Specify source address to use when connecting to RADIUS servers
          enum:
          - tunnel
          - oob
          - any
          type: string
      type: object
      x-examples:
        example-1:
          acct_servers:
          - host: 1.2.3.4
            port: 1812
            secret: testing123
          auth_servers:
          - host: 1.2.3.4
            port: 1812
            secret: testing123
          - host: radius.internal
            port: 1812
            secret: testing123
          enabled: true
          server_selection: ordered
    mxedge:
      description: MxEdge
      properties:
        created_time:
          readOnly: true
          type: number
        for_site:
          readOnly: true
          type: boolean
        id:
          example: 95ddd29a-6a3c-929e-a431-51a5b09f36a6
          format: uuid
          readOnly: true
          type: string
        magic:
          example: L-NpT5gi-ADR8WTFd4EiQPY3cP5WdSoD
          readOnly: true
          type: string
        model:
          example: ME-100
          type: string
        modified_time:
          readOnly: true
          type: number
        mxagent_registered:
          readOnly: true
          type: boolean
        mxcluster_id:
          description: MxCluster this MxEdge belongs to
          example: 572586b7-f97b-a22b-526c-8b97a3f609c4
          format: uuid
          type: string
        mxedge_mgmt:
          properties:
            mist_password:
              example: MIST_PASSWORD
              type: string
            root_password:
              example: ROOT_PASSWORD
              type: string
          type: object
        name:
          example: Guest
          type: string
        note:
          example: note for mxedge
          type: string
        ntp_servers:
          items:
            type: string
          type: array
        oob_ip_config:
          description: ip configuration of the Mist Edge out-of-band management interface
          properties:
            dns:
              default:
              - 8.8.8.8
              - 8.8.4.4
              description: if `type`=`static`
              example:
              - 8.8.8.8
              - 4.4.4.4
              - 2001:4860:4860::8888
              items:
                type: string
              type: array
            gateway:
              description: if `type`=`static`
              example: 10.2.1.254
              type: string
            gateway6:
              example: 2601:1700:43c0:dc0::1
              type: string
            ip:
              description: if `type`=`static`
              example: 10.2.1.2
              type: string
            ip6:
              example: 2601:1700:43c0:dc0:20c:29ff:fea7:93bc
              type: string
            netmask:
              description: if `type`=`static`
              example: 255.255.255.0
              type: string
            netmask6:
              example: /64
              type: string
            type:
              default: dhcp
              enum:
              - static
              - dhcp
              example: static
              type: string
            type6:
              enum:
              - static
              - dhcp
              example: static
              type: string
          type: object
        org_id:
          format: uuid
          readOnly: true
          type: string
        proxy:
          properties:
            url:
              description: Proxy Configuration to talk to Mist
              example: http://proxy.internal:8080/
              type: string
          type: object
        services:
