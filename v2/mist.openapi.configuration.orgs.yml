                          minLength: 1
                          type: string
                        id:
                          minLength: 1
                          type: string
                        map_id:
                          minLength: 1
                          type: string
                        name:
                          minLength: 1
                          type: string
                        reason:
                          minLength: 1
                          type: string
                      type: object
                    minItems: 1
                    type: array
                    uniqueItems: true
                  site_id:
                    minLength: 1
                    type: string
                  summary:
                    properties:
