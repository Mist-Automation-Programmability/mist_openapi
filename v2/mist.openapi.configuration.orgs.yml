  /api/v1/orgs/{org_id}/inventory:
    get:
      description: "Get Org Inventory\n\n### VC (Virtual-Chassis) Management\nIdeally\
        \ VC should be managed as a single device - where - one managed entity where\
        \ config / monitoring is anchored against (with a stable identify MAC) - all\
        \ members appears in the inventory\n\nIn our implementation, we strive to\
        \ achieve that without manual user configurations by \n1. during claim or\
        \ adoption a VC, we require FPC0 to exist and will use its MAC as identify\
        \ for the entire chassis\n2. other VC members will be automatically populated\
        \ when they\u2019re all present\n\nThe perceivable result is \n1. from `/sites/:site_id/stats/devices/:fpc0_mac`\
        \ API, you\u2019d see the VC where module_stat contains the VC members \n\
        2. from `/orgs/:org_id/inventory?vc=true` API, you\u2019d see all VC members\
        \ with vc_mac pointing to the FPC0"
      operationId: getOrgInventory
      parameters:
      - description: device serial
        in: query
        name: serial
        schema:
          type: string
      - description: device model
        in: query
        name: model
        schema:
          type: string
      - in: query
        name: type
        schema:
          enum:
          - ap
          - switch
          - gateway
          type: string
      - description: MAC address
        in: query
        name: mac
        schema:
          type: string
      - description: site id if assigned, null if not assigned
        in: query
        name: site_id
        schema:
          type: string
      - in: query
        name: vc_mac
        schema:
          type: string
      - in: query
        name: vc
        schema:
          type: string
      - in: query
        name: unassigned
        schema:
          type: boolean
      - $ref: '#/components/parameters/limit'
      - $ref: '#/components/parameters/page'
      responses:
        '200':
          $ref: '#/components/responses/OrgInventory'
        '400':
          $ref: '#/components/responses/HTTP400'
        '401':
          $ref: '#/components/responses/HTTP401'
        '403':
          $ref: '#/components/responses/HTTP403'
        '404':
          $ref: '#/components/responses/HTTP404'
        '429':
          $ref: '#/components/responses/HTTP429'
      summary: getOrgInventory
      tags:
      - Orgs Inventory
      - Configuration
    parameters:
    - $ref: '#/components/parameters/org_id'
    post:
      description: Add Device to Org Inventory with the device claim codes
      operationId: addOrgInventory
      requestBody:
        content:
          application/json:
            examples:
              Example:
                value:
                - 6JG8E-PTFV2-A9Z2N
                - DVH4V-SNMSZ-PDXBR
            schema:
              description: List of device Claim Codes
              example:
              - 6JG8E-PTFV2-A9Z2N
              - DVH4V-SNMSZ-PDXBR
              items:
                type: string
              minItems: 1
              type: array
              uniqueItems: true
        description: Request Body
      responses:
        '200':
          $ref: '#/components/responses/OrgInventoryAdd'
        '400':
          content:
            application/json:
              examples:
                example-1:
                  value: {}
              schema:
                properties: {}
                type: object
          description: if none of the entries are valid
        '401':
          $ref: '#/components/responses/HTTP401'
        '403':
          $ref: '#/components/responses/HTTP403'
        '404':
          $ref: '#/components/responses/HTTP404'
        '429':
          $ref: '#/components/responses/HTTP429'
      summary: addOrgInventory
      tags:
      - Orgs Inventory
      - Configuration
    put:
      description: Update Org Inventory
      operationId: updateOrgInventoryAssignment
      requestBody:
        content:
          application/json:
            examples:
              assign:
                value:
                  disable_auto_config: false
                  macs:
                  - 5c5b350e0001
                  managed: false
                  no_reassign: false
                  op: assign
                  site_id: 4ac1dcf4-9d8b-7211-65c4-057819f0862b
              delete:
                value:
                  macs:
                  - 5c5b350e0001
                  op: delete
                  serials:
                  - FXLH2015150025
                  - FXLH2015150026
            schema:
              properties:
                disable_auto_config:
                  default: false
                  description: if `op`==`assign`, a **cloud-ready** switch/gateway
                    will be managed/configured by Mist by default, this disabled the
                    behavior
                  type: boolean
                macs:
                  description: if `op`==`assign`, `op`==`unassign`,  `op`==`manage`or
                    `op`==`unmanage` , list of MAC, e.g. ["5c5b350e0001"]
                  items:
                    type: string
                  type: array
                managed:
                  default: false
                  description: if `op`==`assign`, an **adopted** switch/gateway will
                    not be managed/configured by Mist by default, this enables the
                    behavior
                  type: boolean
                no_reassign:
                  description: if `op`==`assign`, if true, treat site assignment against
                    an already assigned AP as error
                  type: boolean
                op:
                  description: '* if `op`== `manage`: Upgrade to mist-managed

                    * if `op`== `unmanage`: Downgrade to basic monitoring

                    * if `op`== `assign`: Assign inventory to a site

                    * if `op`== `unassign`: Unassign inventory to a site

                    * if `op`== `delete`: Delete multiple inventory from org

                    '
                  enum:
                  - assign
                  - unassign
                  - delete
                  - manage
                  - unmanage
                  type: string
                serials:
                  description: if `op`==`delete`, list of serial numbers, e.g. ["FXLH2015150025"]
                  items:
                    type: string
                  type: array
                site_id:
                  description: if `op`==`assign`, target site id
                  format: uuid
                  type: string
              required:
              - op
              type: object
      responses:
        '200':
          $ref: '#/components/responses/OrgInventoryChanges'
        '400':
          $ref: '#/components/responses/HTTP400'
        '401':
          $ref: '#/components/responses/HTTP401'
        '403':
          $ref: '#/components/responses/HTTP403'
        '404':
          $ref: '#/components/responses/HTTP404'
        '429':
          $ref: '#/components/responses/HTTP429'
      summary: updateOrgInventoryAssignment
      tags:
      - Orgs Inventory
      - Configuration
