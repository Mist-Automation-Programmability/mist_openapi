  /api/v1/register/verify/{token}:
    parameters:
    - $ref: '#/components/parameters/token'
    post:
      description: Verify registration
      operationId: verifyRegistration
      responses:
        '200':
          content:
            application/json:
              examples:
                Response if successful:
                  value:
                    return_to: http://mist.zendesk.com/hc/quickstart.pdf
                Response if successful but failed to apply the invitation automatically:
                  value:
                    detail: password policy not met
                    invite_not_applied: true
                    min_length: 8
              schema:
                properties:
                  detail:
                    type: string
                  invite_not_applied:
                    type: boolean
                  min_length:
                    type: integer
                  return_to:
                    type: string
                type: object
          description: OK
          headers:
            Set-Cookie:
              schema:
                example: csrftoken=vwvBuq9qkqaKh7lu8tNc0gkvBfEaLAmx; expires=Tue,
                  15-Mar-2016 19:47:20 GMT; Max-Age=31449600; Path=/
                type: string
        '400':
          content:
            application/json:
              examples:
                already registered:
                  value:
                    detail: already registered
                verification expired:
                  value:
                    detail: expired
              schema:
                properties:
                  detail:
                    type: string
                required:
                - detail
                type: object
          description: Response if verification expired or already registered
        '401':
          content:
            application/json:
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
              schema:
                properties:
                  detail:
                    type: string
                type: object
          description: Unauthorized
        '403':
          content:
            application/json:
              examples:
                Permission Denied:
                  value:
                    detail: You do not have permission to perform this action.
              schema:
                properties:
                  detail:
                    type: string
                type: object
          description: Permission Denied
        '404':
          content:
            application/json:
              examples:
                example-1:
                  value:
                    detail: Not found.
              schema:
                properties:
                  detail:
                    type: string
                required:
                - detail
                type: object
          description: Response if secret is invalid
        '429':
          content:
            application/json:
              examples:
                Unauthorized:
                  value:
                    detail: Too Many Request. The API Token used for the request reached
                      the 5000 API Calls per hour threshold
              schema:
                properties:
                  detail:
                    type: string
                type: object
          description: Too Many Request. The API Token used for the request reached
            the 5000 API Calls per hour threshold
      summary: verifyRegistration
      tags:
      - Orgs Admins
components:
  parameters:
    admin_id:
      in: path
      name: admin_id
      required: true
      schema:
        example: 000000ab-00ab-00ab-00ab-0000000000ab
        format: uuid
        type: string
    alarm_id:
      in: path
      name: alarm_id
      required: true
      schema:
        example: 000000ab-00ab-00ab-00ab-0000000000ab
        format: uuid
        type: string
    alarmtemplate_id:
      in: path
      name: alarmtemplate_id
      required: true
      schema:
        example: 000000ab-00ab-00ab-00ab-0000000000ab
        format: uuid
        type: string
    apitoken_id:
      in: path
      name: apitoken_id
      required: true
      schema:
        example: 000000ab-00ab-00ab-00ab-0000000000ab
        format: uuid
        type: string
    aptemplate_id:
      in: path
      name: aptemplate_id
      required: true
      schema:
        format: uuid
        type: string
    asset_id:
      in: path
      name: asset_id
      required: true
      schema:
        example: 000000ab-00ab-00ab-00ab-0000000000ab
        format: uuid
        type: string
    assetfilter_id:
      in: path
      name: assetfilter_id
      required: true
      schema:
        example: 000000ab-00ab-00ab-00ab-0000000000ab
        format: uuid
        type: string
    device_mac:
      in: path
      name: device_mac
      required: true
      schema:
        example: 0000000000ab
        pattern: ^[0-9a-fA-F]{12}$
        type: string
    deviceprofile_id:
      in: path
      name: deviceprofile_id
      required: true
      schema:
        example: 000000ab-00ab-00ab-00ab-0000000000ab
        format: uuid
        type: string
    duration:
      description: "For historical stats and/or logs where time range is needed, you\
        \ can specify the time range in a few different ways:\n  * ?start=1430000000&end=1430864000\t\
        specify the start / end\n  * ?end=1430864000&duration=1d\tspecify end time\
        \ and duration\n  * ?duration=1d\tspecify duration, end will be now() in seconds"
      in: query
      name: duration
      required: false
      schema:
        default: 1d
        example: 10m
        type: string
    end:
      in: query
      name: end
      schema:
        default: 0
        minimum: 0
        type: integer
    evpn_topology_id:
      in: path
      name: evpn_topology_id
      required: true
      schema:
        example: 000000ab-00ab-00ab-00ab-0000000000ab
        format: uuid
        type: string
    gatewaytemplate_id:
      in: path
      name: gatewaytemplate_id
      required: true
      schema:
        example: 000000ab-00ab-00ab-00ab-0000000000ab
        format: uuid
        type: string
    guest_mac:
      in: path
      name: guest_mac
      required: true
      schema:
        example: 0000000000ab
        pattern: ^[0-9a-fA-F]{12}$
        type: string
    idpprofile_id:
      in: path
      name: idpprofile_id
