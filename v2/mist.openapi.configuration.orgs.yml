          description: '"[0:3]"            // "abcdef" -> "abc"

            "split(.)[1]"      // "a.b.c" -> "b"

            "split(-)[1][0:3]" // "a1234-b5678-c90" -> "b56"  '
          example: split(.)[1]
          nullable: true
          type: string
        model:
          type: string
        prefix:
          example: XX-
          nullable: true
          type: string
        src:
          enum:
          - name
          - subnet
          - lldp_system_name
          - dns_suffix
          - model
          - lldp_port_desc
          type: string
        subnet:
          type: string
        suffix:
          example: -YY
          nullable: true
          type: string
        value:
          type: string
      required:
      - src
      type: object
      x-examples:
        dns_suffix:
          expression: split(-)[1][0:3]
          src: dns_suffix
        lldp_system_name:
          expression: split(.)[1]
          src: lldp_system_name
        model:
          model: AP41
          src: model
          value: s1351
        name:
          expression: '[0:3]'
          prefix: XX-
          src: name
          suffix: -YY
        subnet:
          src: subnet
          subnet: 10.1.2.0/18
          value: s1351
    org_device_upgrade_response:
      properties:
        enable_p2p:
          description: whether to allow local AP-to-AP FW upgrade
          type: boolean
        force:
          description: whether to force upgrade when requested version is same as
            running version
          type: boolean
        id:
          description: unique id for the upgrade
          format: uuid
          minLength: 1
          readOnly: true
          type: string
        start_time:
          description: upgrade start time in epoch
          type: number
        status:
          description: status upgrade is in
          enum:
          - created
          - in_progress
          - completed
          - canceled
          type: string
        strategy:
          default: big_bang
          description: upgrade strategy
          enum:
          - big_bang
          minLength: 1
          type: string
        target_version:
          description: version to upgrade to
          minLength: 1
          type: string
        upgrades:
          items:
            properties:
              site_id:
                format: uuid
                type: string
              upgrade:
                properties:
                  id:
                    format: uuid
                    type: string
                  start_time:
                    description: upgrade start time in epoch
                    type: integer
                  status:
                    description: status upgrade is in
                    enum:
                    - created
                    - in_progress
                    - completed
                    - cancelled
                    type: string
                  targets:
                    properties:
                      downloaded:
                        description: devices which have the firmware downloaded
                        items:
                          format: uuid
                          type: string
                        type: array
                      failed:
                        description: devices which have the failed to upgrade
                        items:
                          format: uuid
                          type: string
                        type: array
                      reboot_in_progress:
                        description: devices which are rebooting
                        items:
                          format: uuid
                          type: string
                        type: array
                      rebooted:
                        description: devices which have rebooted successfully
                        items:
                          format: uuid
                          type: string
                        type: array
                      scheduled:
                        description: devices which cloud has scheduled an upgrade
                        items:
                          format: uuid
                          type: string
                        type: array
                      skipped:
                        description: devices which have skipped upgrade since requested
                          version was same as running version. Use `force` to always
                          upgrade
                        items:
                          format: uuid
                          type: string
                        type: array
                      upgraded:
                        description: devices which have upgraded successfully
                        items:
                          format: uuid
                          type: string
                        type: array
                    type: object
                type: object
            type: object
          type: array
      required:
      - id
      title: org_device_upgrade_response
      type: object
      x-examples:
        example-1:
          enable_p2p: true
          force: true
          id: 442f6eca-6276-4993-bfeb-53c6bbba6f08
          start_time: 0
          status: created
          strategy: big_bang
          target_version: string
          upgrades:
          - site_id: 72771e6a-6f5e-4de4-a5b9-1266c4197811
            upgrade:
              id: 441f6eca-6276-4993-bfeb-53c7bbba6f08
              start_time: 0
              status: created
              targets:
                download_requested:
                - 440f6eca-6276-4993-bfeb-53c8bbba6f08
                downloaded:
                - 439f6eca-6276-4993-bfeb-53c9bbba6f08
                failed:
                - 438f6eca-6276-4993-bfeb-53cabbba6f08
                reboot_in_progress:
                - 437f6eca-6276-4993-bfeb-53ccbbba6f08
                rebooted:
                - 436f6eca-6276-4993-bfeb-53cebbba6f08
                skipped:
                - 435f6eca-6276-4993-bfeb-53cfbbba6f08
