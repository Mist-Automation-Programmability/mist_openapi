          example: L-NpT5gi-ADR8WTFd4EiQPY3cP5WdSoD
          readOnly: true
          type: string
        model:
          example: ME-100
          type: string
        modified_time:
          readOnly: true
          type: number
        mxagent_registered:
          readOnly: true
          type: boolean
        mxcluster_id:
          description: MxCluster this MxEdge belongs to
          example: 572586b7-f97b-a22b-526c-8b97a3f609c4
          format: uuid
          type: string
