  /api/v1/register:
    post:
      description: 'Register a new admin and his/her org

        An email will also be sent to the user with a link to https://manage.mist.com/verify/register?token=:token'
      operationId: registerNewAdmin
      requestBody:
        content:
          application/json:
            schema:
              properties:
                account_only:
                  default: false
                  description: skip creating initial setup if true
                  type: boolean
                allow_mist:
                  default: false
                  description: whether to allow Mist to look at this org
                  type: boolean
                email:
                  type: string
                first_name:
                  type: string
                invite_code:
                  description: required initially
                  type: string
                last_name:
                  type: string
                org_name:
                  type: string
                password:
                  type: string
                recaptcha:
                  type: string
                referer_invite_token:
                  description: the invite token to apply after account creation
                  type: string
                return_to:
                  description: the url the user should be redirected back to
                  type: string
              required:
              - email
              - password
              - first_name
              - last_name
              - org_name
              - recaptcha
              type: object
        description: Request Body
      responses:
        '200':
          $ref: '#/components/responses/OK'
        '400':
          $ref: '#/components/responses/HTTP400'
        '401':
          $ref: '#/components/responses/HTTP401'
        '403':
          $ref: '#/components/responses/HTTP403'
        '404':
          $ref: '#/components/responses/HTTP404'
        '429':
          $ref: '#/components/responses/HTTP429'
      summary: registerNewAdmin
      tags:
      - Orgs Admins
      - Configuration
  /api/v1/register/verify/{token}:
    parameters:
    - $ref: '#/components/parameters/token'
    post:
      description: Verify registration
      operationId: verifyRegistration
      responses:
        '200':
          content:
            application/json:
              examples:
                Response if successful:
                  value:
                    return_to: http://mist.zendesk.com/hc/quickstart.pdf
                Response if successful but failed to apply the invitation automatically:
                  value:
                    detail: password policy not met
                    invite_not_applied: true
                    min_length: 8
              schema:
                properties:
                  detail:
                    type: string
                  invite_not_applied:
                    type: boolean
                  min_length:
                    type: integer
                  return_to:
                    type: string
                type: object
          description: OK
          headers:
            Set-Cookie:
              schema:
                example: csrftoken=vwvBuq9qkqaKh7lu8tNc0gkvBfEaLAmx; expires=Tue,
                  15-Mar-2016 19:47:20 GMT; Max-Age=31449600; Path=/
                type: string
        '400':
          content:
            application/json:
              examples:
                already registered:
                  value:
                    detail: already registered
                verification expired:
                  value:
                    detail: expired
              schema:
                properties:
                  detail:
                    type: string
                required:
                - detail
                type: object
          description: Response if verification expired or already registered
        '401':
          $ref: '#/components/responses/HTTP401'
        '403':
          $ref: '#/components/responses/HTTP403'
        '404':
          content:
            application/json:
              examples:
                example-1:
                  value:
                    detail: Not found.
              schema:
                properties:
                  detail:
                    type: string
                required:
                - detail
                type: object
          description: Response if secret is invalid
        '429':
          $ref: '#/components/responses/HTTP429'
      summary: verifyRegistration
      tags:
      - Orgs Admins
      - Configuration
