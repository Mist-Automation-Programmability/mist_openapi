      in: path
      name: device_mac
      required: true
      schema:
        example: 0000000000ab
        pattern: ^[0-9a-fA-F]{12}$
        type: string
    duration:
      description: "For historical stats and/or logs where time range is needed, you\
        \ can specify the time range in a few different ways:\n  * ?start=1430000000&end=1430864000\t\
        specify the start / end\n  * ?end=1430864000&duration=1d\tspecify end time\
        \ and duration\n  * ?duration=1d\tspecify duration, end will be now() in seconds"
      in: query
      name: duration
      required: false
      schema:
        default: 1d
        example: 10m
        type: string
    end:
      in: query
      name: end
      schema:
        default: 0
        minimum: 0
        type: integer
    interval:
      description: Aggregation works by giving a time range plus interval (e.g. 1d,
        1h, 10m) where aggregation function would be applied to.
      in: query
      name: interval
      required: false
      schema:
        example: 10m
        type: string
    ip:
      in: query
      name: ip address
      required: false
      schema:
        example: 192.168.1.1
        format: ipv4
        type: string
