      name: duration
      required: false
      schema:
        default: 1d
        example: 10m
        type: string
    end:
      in: query
      name: end
      schema:
        default: 0
        minimum: 0
        type: integer
    fields:
      description: list of additional fields requests, comma separeted
      in: query
      name: fields
      required: false
      schema:
        example: field1,field2
        type: string
    interval:
      description: Aggregation works by giving a time range plus interval (e.g. 1d,
