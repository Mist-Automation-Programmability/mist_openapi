                  type: string
                node:
                  description: Only for HA
                  enum:
                  - node0
                  - node1
                  type: string
                prefix:
                  description: route prefix
                  example: 192.168.0.5/30
                  type: string
                protocol:
                  description: only bgp is supported
                  example: bgp
                  type: string
                route:
                  description: 'if specified, dump both received and advertised

                    * for SSR, show bgp neighbors 10.250.18.202 received-routes/advertised-routes

                    * for SRX, show route receive-protocol/advertise-protocol bgp
                    192.168.255.12'
                  enum:
                  - received
                  - advertised
                  example: advertised
                  type: string
                vrf_name:
                  example: default
                  type: string
              type: object
              x-examples:
                example-1:
                  neighbor: 192.168.4.1
                  prefix: 192.168.0.5/30
                  protocol: bgp
                  route: advertised
                  vrf_name: default
        description: all attributes are optional
