                  type: boolean
                csv:
                  description: csv file for ap name mapping, optional
                  format: binary
                  type: string
                file:
                  format: binary
                  type: string
                json:
                  properties:
                    import_all_floorplans:
                      default: false
                      type: boolean
                    import_height:
                      default: true
                      type: boolean
                    import_orientation:
                      default: true
