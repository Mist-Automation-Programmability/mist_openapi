  /api/v1/sites/{site_id}/maps/import:
    parameters:
    - $ref: '#/components/parameters/site_id'
    post:
      description: 'Import data from files is a multipart POST which has an file,
        an optional json, and an optional csv, to create floorplan, assign matching
        inventory to specific site, place ap if name or mac matches.


        # Note

        This endpoint (at the site level), the AP must be already assigned to the
        site to be placed on the floorplan. If you want to place APs from the Org
        inventory, it is required to use the endpoint at the Org level [importOrgMaps](#operation/importOrgMaps)


        # CSV File Format

        ```csv

        Vendor AP name,Mist AP Mac

        US Office AP-2,5c:5b:35:00:00:02

        US Office AP-3,5c5b35000002

        ``` '
      operationId: importSiteMaps
      requestBody:
        content:
          multipart/form-data:
            examples:
              example-1:
                value:
                  auto_deviceprofile_assignment: true
                  csv: string
                  file: string
                  json:
                    import_all_floorplans: false
                    import_height: true
                    import_orientation: true
                    site_id: 72771e6a-6f5e-4de4-a5b9-1266c4197811
                    vendor_name: ekahau
            schema:
              properties:
                auto_deviceprofile_assignment:
                  description: whether to auto assign device to deviceprofile by name
                  type: boolean
                csv:
                  description: csv file for ap name mapping, optional
                  format: binary
                  type: string
                file:
                  description: ekahau or ibwave file
                  format: binary
                  type: string
                json:
                  properties:
                    import_all_floorplans:
                      default: false
                      type: boolean
                    import_height:
                      default: true
                      type: boolean
                    import_orientation:
                      default: true
                      type: boolean
                    vendor_name:
                      enum:
                      - ekahau
                      - ibwave
                      type: string
                  required:
                  - vendor_name
                  type: object
              type: object
        description: ''
      responses:
        '200':
          content:
            application/json:
              examples:
                example-1:
                  value:
                    aps:
                    - action: ignored
                      floorplan_id: cbdb7f0b-3be0-4872-88f9-58790b509c23-j68kows8
                      height: 3
                      mac: 5c5b35000001
                      orientation: 45
                    - action: placed
                      height: 3
                      mac: 5c5b35000001
                      map_id: 845a23bf-bed9-e43c-4c86-6fa474be7ae5
                      orientation: 45
                    floorplans:
                    - action: ignored
                      id: cbdb7f0b-3be0-4872-88f9-58790b509c23-j68kows8
                      map_id: 845a23bf-bed9-e43c-4c86-6fa474be7ae5
                      name: map1
                      reason: no aps placed
                    site_id: 4ac1dcf4-9d8b-7211-65c4-057819f0862b
                    summary:
                      num_ap_assigned: 1
                      num_inv_assigned: 1
                      num_map_assigned: 1
              schema:
                description: ''
                properties:
                  aps:
                    items:
                      properties:
                        action:
                          enum:
                          - placed
                          - assigned-placed
                          - named-placed
                          - assigned-named-placed
                          - ignored
                          minLength: 1
                          type: string
                        floorplan_id:
                          minLength: 1
                          type: string
                        height:
                          type: number
                        mac:
                          minLength: 1
                          type: string
                        map_id:
                          minLength: 1
                          type: string
                        orientation:
                          type: number
                        reason:
                          minLength: 1
                          type: string
                      required:
                      - mac
                      type: object
                    minItems: 1
                    type: array
                    uniqueItems: true
                  floorplans:
                    items:
                      properties:
                        action:
                          enum:
                          - imported
                          - ignored
                          minLength: 1
                          type: string
                        id:
                          minLength: 1
                          type: string
                        map_id:
                          minLength: 1
                          type: string
                        name:
                          minLength: 1
                          type: string
                        reason:
                          minLength: 1
                          type: string
                      type: object
                    minItems: 1
                    type: array
                    uniqueItems: true
                  site_id:
                    minLength: 1
                    type: string
                  summary:
                    properties:
                      num_ap_assigned:
                        type: number
                      num_inv_assigned:
                        type: number
                      num_map_assigned:
                        type: number
                    required:
                    - num_ap_assigned
                    type: object
                required:
                - site_id
