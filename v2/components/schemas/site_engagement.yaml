description: "**Note**: if hours does not exist, it\u2019s treated as everyday of\
  \ the week, 00:00-23:59. Currently we don\u2019t allow multiple ranges for the same\
  \ day\n\n**Note**: default values for `dwell_tags`: passerby (1,300) bounce (301,\
  \ 14400) engaged (14401, 28800) stationed (28801, 42000)\n\n**Note**: default values\
  \ for `dwell_tag_names`: passerby = \u201CPasserby\u201D, bounce = \u201CVisitor\u201D\
  , engaged = \u201CAssociates\u201D, stationed = \u201CAssets\u201D"
properties:
  dwell_tag_names:
    properties:
      bounce:
        type: string
      engaged:
        type: string
      passerby:
        type: string
      stationed:
        type: string
    required:
    - passerby
    - bounce
    - engaged
    - stationed
    type: object
  dwell_tags:
    description: add tags to visits within the duration (in seconds), available tags
      (passerby, bounce, engaged, stationed)
    properties:
      bounce:
        nullable: true
        type: string
      engaged:
        nullable: true
        type: string
      passerby:
        nullable: true
        type: string
      stationed:
        nullable: true
        type: string
    type: object
  hours:
    description: "hours of operation filter, the available days (mon, tue, wed, thu,\
      \ fri, sat, sun). \n\n**Note**: If the dow is not defined then it\u2019s treated\
      \ as 00:00-23:59."
    properties:
      fri:
        type: string
      mon:
        type: string
      sta:
        type: string
      sun:
        type: string
      thu:
        type: string
      tue:
        type: string
      wed:
        type: string
    type: object
  max_dwell:
    default: 43200
    description: max time, default is 43200(12h), max is 68400 (18h)
    maximum: 68400
    type: integer
  min_dwell:
    description: min time
    minimum: 0
    type: integer
required:
- dwell_tag_names
title: site_engagement
type: object
x-examples:
  example-1:
    dwell_tag_names:
      bounce: Bounce
      engaged: Engaged
      passerby: Passer By
      stationed: Stationed
    dwell_tags:
      engaged: 300-14400
      stationed: 14400-43200
    hours:
      fri: 09:00-17:00
      mon: 09:00-17:00
    max_dwell: 43200
