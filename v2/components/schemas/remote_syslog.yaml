title: remote_syslog
type: object
x-examples:
  example-1:
    archive:
      files: 111
      size: 5m
    console:
      contents:
      - facility: any | authorization | conflict-log | change-log | daemon | dfc |
          kernel | interactive-commands | ftp | firewall | external | pfe | ntp |
          security | user
        severity: any | alert | emergency | critical | warning | info | notice | error
    enabled: true
    files:
    - archive:
        files: 10
        size: 5m
      contents:
      - facility: any | authorization | conflict-log | change-log | daemon | dfc |
          kernel | interactive-commands | ftp | firewall | external | pfe | ntp |
          security | user
        severity: any | alert | emergency | critical | warning | info | notice | error
      explicit_priority: true
      file: file-name
      match: '!alarm|ntp|errors.crc_error[chan]'
      structured_data: true
    network: default
    send_to_all_servers: true
    servers:
    - contents:
      - facility: any | authorization | conflict-log | change-log | daemon | dfc |
          kernel | interactive-commands | ftp | firewall | external | pfe | ntp |
          security | user
        severity: any | alert | emergency | critical | warning | info | notice | error
      explicit_priority: true
      facility: config
      host: syslogd.internal
      match: '!alarm|ntp|errors.crc_error[chan]'
      port: 514
      protocol: udp
      routing_instance: routing-instance-name
      severity: info
      source_address: 192.168.1.1
      structured_data: true
      tag: ''
    time_format: millisecond | year |  year millisecond
    users:
    - contents:
      - facility: any | authorization | conflict-log | change-log | daemon | dfc |
          kernel | interactive-commands | ftp | firewall | external | pfe | ntp |
          security | user
        severity: any | alert | emergency | critical | warning | info | notice | error
      match: '!alarm|ntp|errors.crc_error[chan]'
      user: '*'
