description: Initiate a Scan Radio Packet Capture
properties:
  ap_mac:
    description: filter by ap_mac
    example: 'null'
    nullable: true
    type: string
  aps:
    additionalProperties:
      description: Property key is the AP MAC address (e.g. "5c5b35000001"). All optionals,
        parent parameters will be used if not defined
      properties:
        band:
          default: '24'
          description: Only Single value allowed
          enum:
          - '24'
          - '5'
          - '6'
          type: string
        channel:
          description: specify the channel value where scan PCAP has to be started
          type: string
        tcpdump_expression:
          description: tcpdump expression, port specific if specified under ports
            dict, otherwise applicable across ports if specified at top level of payload.
            Port specific value overrides top level value when both exist.
          type: string
        width:
          description: specify the bandwidth value with respect to the channel.
          type: string
      type: object
    type: object
  band:
    default: '24'
    description: Only Single value allowed
    enum:
    - '24'
    - '5'
    - '6'
    example: '24'
    nullable: true
    type: string
  bandwidth:
    default: 20
    enum:
    - 20
    - 40
    example: 20
    type: number
  channel:
    default: 1
    description: specify the channel value where scan PCAP has to be started
    example: 1
    type: number
  client_mac:
    description: filter by client mac
    example: 38f9d3972ff1
    nullable: true
    type: string
  duration:
    default: 600
    description: duration of the capture, in seconds
    example: 600
    maximum: 86400
    minimum: 0
    type: integer
  format:
    default: pcap
    enum:
    - pcap
    - stream
    example: stream
    type: string
  max_pkt_len:
    default: 512
    description: max_len of each packet to capture
    example: 68
    maximum: 2048
    minimum: 0
    type: integer
  num_packets:
    default: 1024
    description: number of packets to capture, 0 for unlimited
    example: 100
    type: integer
  tcpdump_expression:
    description: tcpdump expression, port specific if specified under ports dict,
      otherwise applicable across ports if specified at top level of payload. Port
      specific value overrides top level value when both exist.
    example: tcp port 80
    type: string
  type:
    enum:
    - scan
    example: scan
    type: string
  width:
    description: specify the bandwidth value with respect to the channel.
    type: string
required:
- type
title: capture_scan
type: object
x-examples:
  Scan Radio Packet Capture:
    ap_mac: 'null'
    aps:
      5c5b35000001:
        band: '5'
        bandwidth: 20
        channe: 7
    band: '24'
    bandwidth: 20
    channel: 1
    client_mac: 38f9d3972ff1
    duration: 600
    format: pcap
    max_pkt_len: 512
    num_packets: 1024
    tcpdump_expression: tcp port 80
    type: scan
    width: string
x-stoplight:
  id: zystikfpgx009
