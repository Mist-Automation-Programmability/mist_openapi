description: Authentication Server
properties:
  host:
    description: ip / hostname of RADIUS server
    type: string
  keywrap_enabled:
    type: boolean
  keywrap_format:
    type: string
  keywrap_kek:
    type: string
  keywrap_mack:
    type: string
  port:
    default: 1812
    description: Auth port of RADIUS server
    type: integer
  secret:
    description: secret of RADIUS server
    type: string
required:
- host
- port
- secret
title: auth_server
type: object
