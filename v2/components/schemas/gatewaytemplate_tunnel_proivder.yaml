        download_mbps: 200
        enable_aup: false
        enable_caution: false
        enforce_authentication: false
        subnets:
        - 172.16.8.0/24
        - 172.16.32.0/23
        upload_mbps: 200
      upload_mbps: 200
      use_xff: false
