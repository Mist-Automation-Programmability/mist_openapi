    map_id: 63eda950-c6da-11e4-a628-60f81dd250cc
    message: Welcome to Mist
    minor: 21
    modified_time: 0
    name: conference room
    org_id: a40f5d1f-d889-42e9-94ea-b9b33585fc6b
    power: 4
    power_mode: default
    site_id: 72771e6a-6f5e-4de4-a5b9-1266c4197811
    url: http://www.mist.com/any
