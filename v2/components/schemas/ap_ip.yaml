description: IP AP settings
properties:
  dns:
    description: if `type`==`static`
    items:
      type: string
    type: array
  dns_suffix:
    description: required if `type`==`static`
    items:
      type: string
    type: array
  gateway:
    description: required if `type`==`static`
    format: ipv4
    type: string
  gateway6:
    format: ipv6
    type: string
  ip:
    description: required if `type`==`static`
    format: ipv4
    type: string
  ip6:
    format: ipv6
    type: string
  mtu:
    type: integer
  netmask:
    description: required if `type`==`static`
    format: ipv4
    type: string
  netmask6:
    format: ipv6
    type: string
  type:
    description: static / dhcp (default)
    enum:
    - static
    - dhcp
    type: string
  type6:
    enum:
    - static
    - dhcp
    type: string
  vlan_id:
    default: 1
    description: management vlan id, default is 1 (untagged)
    type: integer
title: ap_ip
type: object
x-examples:
  example-1:
    dns:
    - string
    dns_suffix:
    - string
    gateway: 192.168.0.1
    gateway6: 2001:0db8:85a3:0000:0000:8a2e:0370:7334
    ip: 192.168.0.1
    ip6: 2001:0db8:85a3:0000:0000:8a2e:0370:7334
    mtu: 0
    netmask: 192.168.0.1
    netmask6: 2001:0db8:85a3:0000:0000:8a2e:0370:7334
    type: static
    type6: static
    vlan_id: 1
