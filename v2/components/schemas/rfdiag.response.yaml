description: RF Diag response
items:
  properties:
    asset_id:
      description: if `type`==`asset`, id of the asset
      format: uuid
      type: string
    asset_name:
      description: if `type`==`asset`, name of the asset
      type: string
    client_name:
      description: if `type`==`client`, hostname of the client
      type: string
    duration:
      description: recording length in seconds, max is 120
      type: integer
    end_time:
      description: timestamp of end of recording
      type: integer
    frame_count:
      description: Number of frames in the output
      type: integer
    id:
      readOnly: true
      type: string
    mac:
      description: if `type`==`client` or `asset`, mac of the device
      type: string
    map_id:
      format: uuid
      type: string
    name:
      type: string
    next:
      description: Optional. id of the next recoding if present. Only valid for site
        survey.
      type: string
    raw_events:
      description: URL to a JSON file that contains array of raw location diag events
      type: string
    ready:
      description: "whether it\u2019s ready for playback"
      type: boolean
    sdkclient_id:
      description: if `type`==`sdkclient`, sdkclient_id of this recording
      format: uuid
      type: string
    sdkclient_name:
      description: if `type`==`sdkclient`, name of the sdkclient
      type: string
    sdkclient_uuid:
      description: if `type`==`sdkclient`, device_id of sdkclient
      format: uuid
      type: string
    start_time:
      description: timestamp of the recording (the start)
      type: integer
    type:
      description: sdkclient / client / asset
      enum:
      - sdkclient
      - client
      - asset
      type: string
    url:
      description: URL to a JSON file that contains an array of frames, each frame
        is the same format
      type: string
  required:
  - name
  - type
  - map_id
  - url
  - raw_events
  - start_time
  - end_time
  - duration
  - frame_count
  - ready
  type: object
minItems: 1
title: rfdiag.response
type: array
uniqueItems: true
