properties:
  events:
    items:
      properties:
        ap_loc:
          description: coordinates (if any) of reporting AP (updated once in 60s per
            client)
          items:
            type: number
          type: array
        beam:
          description: antenna index, from 1-8, clock-wise starting from the LED
          type: integer
        device_id:
          description: device id of the reporting AP
          format: uuid
          type: string
        ibeacon_major:
          type: integer
        ibeacon_minor:
          type: integer
        ibeacon_uuid:
          format: uuid
          type: string
        is_asset:
          type: boolean
        mac:
          description: MAC of the asset/ beacon
          type: string
        map_id:
          format: uuid
          type: string
        mfg_company_id:
          description: BLE manufacturing company ID
          type: string
        mfg_data:
          description: "BLE manufacturing data in hex byte-string format (ie: \u201C\
            112233AABBCC\u201D)"
          type: string
        org_id:
          format: uuid
          type: string
        rssi:
          description: signal strength
          type: number
        service_packets:
          items:
            properties:
              service_data:
                type: string
              service_uuid:
                format: uuid
                type: string
            type: object
          type: array
        site_id:
          format: uuid
          type: string
        timestamp:
          type: integer
      required:
      - beam
      - device_id
      - mac
      - map_id
      - org_id
      - rssi
      - site_id
      type: object
    type: array
  topic:
    type: string
required:
- topic
title: webhook_discovered_raw_rssi
type: object
