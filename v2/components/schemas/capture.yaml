title: capture
x-examples:
  Client Packet Capture:
    ap_mac: string
    client_mac: 60a10a773412
    duration: 600
    includes_mcast: false
    max_pkt_len: 128
    num_packets: 1024
    ssid: 'null'
    type: client
  Gateway (SSR) Packet Capture:
    duration: 600
    format: pcap
    gateways:
      '001122334455':
        ports:
          ge-0/0/0:
            tcpdump_expression: tcp
          ge-0/0/1:
            tcpdump_expression: port 443
          ge-1/0/0:
            tcpdump_expression: tcp
          ge-1/0/1:
            tcpdump_expression: port 443
      '001122334466':
        ports:
          ge-0/0/0:
            tcpdump_expression: udp
          ge-0/0/1:
            tcpdump_expression: port 32768
    max_pkt_len: 128
    num_packets: 1024
    type: gateway
  New Wireless Client Associations:
    ap_mac: 'null'
    client_mac: 60a10a773412
    duration: 600
    includes_mcast: false
    max_pkt_len: 128
    num_packets: 100
    ssid: 'null'
    type: new_assoc
  Radiotap Packet Capture:
    ap_mac: 'null'
    band: 24
    duration: 600
    format: pcap
    max_pkt_len: 128
    num_packets: 1024
    ssid: atest
    tcpdump_expression: tcp port 80
    type: radiotap
    wlan_id: fac8e973-feb9-421a-b381-aabbc4b61f5a
  Radiotap Packet Capture and Wired Packet Capture:
    ap_mac: 'null'
    band: '24'
    client_mac: 38f9d3972ff1
    duration: 600
    format: pcap
    max_pkt_len: 128
    num_packets: 1024
    radiotap_tcpdump_expression: type data
    ssid: atest
    tcpdump_expression: string
    type: radiotap,wired
    wired_tcpdump_expression: tcp port 80
    wireless_tcpdump_expression: string
    wlan_id: fac8e973-feb9-421a-b381-aabbc4b61f5a
  Scan Radio Packet Capture:
    ap_mac: 'null'
    aps:
      5c5b35000001:
        band: '5'
        bandwidth: 20
        channe: 7
    band: '24'
    bandwidth: 20
    channel: 1
    client_mac: 38f9d3972ff1
    duration: 600
    format: pcap
    max_pkt_len: 512
    num_packets: 1024
    tcpdump_expression: tcp port 80
    type: scan
    width: string
  Switch (Junos) Packet Capture:
    duration: 600
    format: pcap
    max_pkt_len: 512
    num_packets: 1024
    switches:
      '001122334455':
        ports:
          ge-0/0/0:
            tcpdump_expression: udp
          ge-0/0/1: {}
          ge-1/0/0: null
          ge-1/0/1: {}
      '001122334466':
        ports:
          ge-0/0/0: {}
          ge-0/0/1: {}
    tcpdump_expression: port 443
    type: switch
  Wired Packet Capture:
    ap_mac: 'null'
    duration: 600
    format: pcap
    max_pkt_len: 128
    num_packets: 1024
    tcpdump_expression: tcp port 80
    type: wired
  Wireless Packet Capture:
    ap_mac: 'null'
    band: '24'
    duration: 600
    format: pcap
    max_pkt_len: 128
    num_packets: 1024
    ssid: string
    type: wireless
    wlan_id: 5028e92b-fc59-4056-91d1-ea4b4ca1617a
