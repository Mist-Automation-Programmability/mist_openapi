properties:
  cochannel_neighbors:
    description: average number of co-channel neighbors
    type: number
  density:
    description: defined by how APs can hear from one and another, 0 - 1 (everyone
      can hear everyone)
    maximum: 1
    minimum: 0
    type: number
  neighbors:
    description: average number of neighbors
    type: number
  noise:
    description: average noise in dBm
    type: number
required:
- noise
- cochannel_neighbors
- neighbors
- density
title: rrm_band_metric
type: object
x-examples:
  example-1:
    cochannel_neighbors: 1
    density: 1
    neighbors: 3
    noise: -82.7
