description: auto_rules in org settings
properties:
  expression:
    description: '"[0:3]"            // "abcdef" -> "abc"

      "split(.)[1]"      // "a.b.c" -> "b"

      "split(-)[1][0:3]" // "a1234-b5678-c90" -> "b56"  '
    example: split(.)[1]
    nullable: true
    type: string
  model:
    type: string
  prefix:
    example: XX-
    nullable: true
    type: string
  src:
    enum:
    - name
    - subnet
    - lldp_system_name
    - dns_suffix
    - model
    - lldp_port_desc
    type: string
  subnet:
    type: string
  suffix:
    example: -YY
    nullable: true
    type: string
  value:
    type: string
required:
- src
title: org_auto_rules
type: object
x-examples:
  dns_suffix:
    expression: split(-)[1][0:3]
    src: dns_suffix
  lldp_system_name:
    expression: split(.)[1]
    src: lldp_system_name
  model:
    model: AP41
    src: model
    value: s1351
  name:
    expression: '[0:3]'
    prefix: XX-
    src: name
    suffix: -YY
  subnet:
    src: subnet
    subnet: 10.1.2.0/18
    value: s1351
