description: Switch template
properties:
  enable:
    type: boolean
  rules:
    items:
      additionalProperties:
        description: 'property key define the type of matching, value is the string
          to match. e.g: `match_name[0:3]`, `match_name[2:6]`, `match_model`,  `match_model[0-6]`'
        type: string
      properties:
        additional_config_cmds:
          items:
            type: string
          type: array
        match_role:
          description: role to match
          type: string
        name:
          type: string
        port_config:
          additionalProperties:
            $ref: ./junos_port_config.yaml
          type: object
        switch_mgmt:
          properties:
            ap_affinity_threshold:
              example: '10'
              type: string
            config_revert_timer:
              default: 10
              type: integer
            dhcp_option_fqdn:
              default: false
              description: Enable to provide the FQDN with DHCP option 81
              type: boolean
            mxedge_proxy_host:
              type: string
            mxedge_proxy_port:
              default: 2222
              type: integer
            use_mxedge_proxy:
              default: false
              type: boolean
          type: object
      type: object
    minItems: 1
    type: array
    uniqueItems: true
title: template_switch.matching
type: object
x-examples:
  example-1:
    enable: true
    rules:
    - additional_config_cmds:
      - set snmp community public
      match_model: EX4300
      match_name[0:3]: abc
      name: match by name
      port_config:
        '*':
          usage: default
        ge-0/0/0:
          usage: uplink
        ge-0/0/8-16,ge-1/0/0-47:
          usage: ap
    - additional_config_cmds:
      - set snmp community public2
      match_role: access
      name: match by role
      port_config:
        ge-0/0/0:
          usage: uplink
