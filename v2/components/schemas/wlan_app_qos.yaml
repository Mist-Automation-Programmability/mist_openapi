description: app qos wlan settings
properties:
  apps:
    additionalProperties:
      properties:
        dscp:
          type: integer
        dst_subnet:
          description: subnet filter is not required but helps AP to only inspect
            certain traffic (thus reducing AP load)
          type: string
        src_subnet:
          description: subnet filter is not required but helps AP to only inspect
            certain traffic (thus reducing AP load)
          type: string
      type: object
    example:
      skype-business-video:
        dscp: 32
        dst_subnet: 10.2.0.0/16
        src_subnet: 10.2.0.0/16
    type: object
  enabled:
    type: boolean
  others:
    items:
      properties:
        dscp:
          example: 32
          type: integer
        dst_subnet:
          example: 10.2.0.0/16
          type: string
        port_ranges:
          example: 80,1024-6553
          type: string
        protocol:
          example: udp
          type: string
        src_subnet:
          example: 10.2.0.0/16
          type: string
      type: object
    minItems: 1
    type: array
    uniqueItems: true
title: wlan_app_qos
type: object
x-examples:
  Example:
    apps:
      skype-business-video:
        dscp: 32
        dst_subnet: 10.2.0.0/16
        src_subnet: 10.2.0.0/16
    enabled: true
    others:
    - dscp: 0
      dst_subnet: 10.2.0.0/16
      port_ranges: 80,1024-6553
      protocol: udp
      src_subnet: 10.2.0.0/16
