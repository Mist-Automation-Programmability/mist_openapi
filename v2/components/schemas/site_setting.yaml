description: Site Settings
properties:
  additional_config_cmds:
    description: 'additional CLI commands to append to the generated switches config '
    items:
      type: string
    type: array
  analytic:
    properties:
      enabled:
        default: false
        description: enable Advanced Analytic feature (using SUB-ANA license)
        type: boolean
    type: object
  ap_matching:
    properties:
      enabled:
        type: boolean
      rules:
        items:
          properties:
            match_model:
              type: string
            name:
              type: string
            port_config:
              additionalProperties:
                $ref: ./ap_port_config.yaml
              description: The property key is the interface(s) (e.g. "eth1,eth2")
              type: object
          type: object
        type: array
    type: object
  ap_port_config:
    properties:
      model_specific:
        additionalProperties:
          additionalProperties:
            $ref: ./ap_port_config.yaml
          description: the property key is the interface(s) (e.g. "eth1,eth2")
          type: object
        description: the property key is the AP model (e.g "AP32")
        type: object
    type: object
  auto_placement:
    description: if we're able to determine its x/y/orientation, this will be populated
    properties:
      orientation:
        type: number
      x:
        type: number
      y:
        type: number
    type: object
  auto_preemption:
    $ref: ./ap_port_config.yaml
  auto_upgrade:
    $ref: ./ap_port_config.yaml
  blacklist_url:
    readOnly: true
    type: string
  ble_config:
    $ref: ./ap_port_config.yaml
  config_auto_revert:
    default: false
    description: whether to enable ap auto config revert
    type: boolean
  created_time:
    readOnly: true
    type: number
  device_updown_threshold:
    default: 0
    description: sending AP_DISCONNECTED event in device-updowns only if AP_CONNECTED
      is not seen within the threshold, in minutes
    maximum: 30
    minimum: 0
    type: integer
  dns_servers:
    description: list of NTP servers
    items:
      type: string
    type: array
  dns_suffix:
    description: list of NTP servers
    items:
      type: string
    type: array
  enable_channel_144:
    default: false
    description: whether to enable channel 144 (some older clients may not support
      it)
    type: boolean
  engagement:
    $ref: ./ap_port_config.yaml
  evpn_options:
    $ref: ./ap_port_config.yaml
  flags:
    additionalProperties:
      type: string
    description: name/val pair objects for location engine to use
    type: object
  for_site:
    readOnly: true
    type: boolean
  gateway_additional_config_cmds:
    description: 'additional CLI commands to append to the generated config for gateways


      **Note**: no check is done'
    items:
      type: string
    type: array
  gateway_mgmt:
    $ref: ./ap_port_config.yaml
  id:
    format: uuid
    readOnly: true
    type: string
  led:
    $ref: ./ap_port_config.yaml
  modified_time:
    readOnly: true
    type: number
  mxedge:
    description: site mist edges form a cluster of radsecproxy servers
    properties:
      mist_das:
        $ref: ./ap_port_config.yaml
      radsec:
        $ref: ./ap_port_config.yaml
    type: object
  mxedge_mgmt:
    $ref: ./ap_port_config.yaml
  mxtunnels:
    $ref: ./ap_port_config.yaml
  networks:
    additionalProperties:
      $ref: ./ap_port_config.yaml
    description: the property key is the network name
    type: object
  ntp_servers:
    description: list of NTP servers
    items:
      type: string
    type: array
  occupancy:
    $ref: ./ap_port_config.yaml
  org_id:
    format: uuid
    readOnly: true
    type: string
  ospf_areas:
    additionalProperties:
      $ref: ./ap_port_config.yaml
    description: the property key is the OSPF area
    type: object
  persist_config_on_device:
    default: false
    description: whether to store the config on AP
    type: boolean
  port_mirroring:
    additionalProperties:
      $ref: ./ap_port_config.yaml
    description: 'Property key is the port mirroring instance name

      port_mirroring can be added under site/settings. It takes interface and ports
      as input for ingress, interface as input for egress and can take interface and
      port as output.'
    type: object
  port_usages:
    additionalProperties:
      $ref: ./ap_port_config.yaml
    description: the property key is the port usage name
    properties:
      dynamic:
        $ref: ./ap_port_config.yaml
    type: object
  proxy:
    description: Proxy Configuration for APs and Site Edges to talk to Mist
    properties:
      url:
        type: string
    type: object
  radio_config:
    $ref: ./ap_port_config.yaml
  radius_config:
    $ref: ./ap_port_config.yaml
  remote_syslog:
    $ref: ./ap_port_config.yaml
  report_gatt:
    default: false
    description: whether AP should periodically connect to BLE devices and report
      GATT device info (device name, manufacturer name, serial number, battery %,
      temperature, humidity)
    type: boolean
  rogue:
    $ref: ./ap_port_config.yaml
  rtsa:
    description: managed mobility
    properties:
      app_waking:
        default: false
        type: boolean
      disable_dead_reckoning:
        type: boolean
      disable_pressure_sensor:
        type: boolean
      enabled:
        type: boolean
      track_asset:
        description: asset tracking related
        type: boolean
    type: object
  simple_alert:
    $ref: ./ap_port_config.yaml
  site_id:
    format: uuid
    readOnly: true
    type: string
  skyatp:
    properties:
      enabled:
        type: boolean
      send_ip_mac_mapping:
        type: boolean
    type: object
  srx_app:
    properties:
      enabled:
        default: false
        type: boolean
    type: object
  ssh_keys:
    description: when limit_ssh_access = true in Org Setting, list of SSH public keys
      provided by Mist Support to install onto APs (see Org:Setting)
    items:
      type: string
    type: array
  ssr:
    $ref: ./ap_port_config.yaml
  status_portal:
    properties:
      enabled:
        type: boolean
      hostnames:
        items:
          type: string
        type: array
    type: object
  switch_matching:
    properties:
      additional_config_cmds:
        description: 'additional CLI commands to append if this rule matches

          NOTE: no check is done'
        items:
          type: string
        type: array
      enabled:
        default: false
        type: boolean
      rules:
        items:
          properties:
            additionalProperty:
              description: Property key is `match_name[x:y]`, where x and y are the
                first and the last characters of the string to match. Value is the
                string to match.
              type: string
            match_model:
              type: string
            name:
              type: string
            port_config:
              additionalProperties:
                properties:
                  usage:
                    type: string
                type: object
              description: Object key is a comma separated list of interface names
                or interface ranges (e.g. ge-0/0/0, ge-0/0/0-5)
              type: object
          type: object
        type: array
    type: object
  switch_mgmt:
    $ref: ./ap_port_config.yaml
  track_anonymous_devices:
    default: false
    description: "whether to track anonymous BLE assets (requires \u2018track_asset\u2019\
      \ enabled)"
    type: boolean
  tunterm_monitoring:
    items:
      $ref: ./ap_port_config.yaml
    type: array
  tunterm_monitoring_disabled:
    type: boolean
  vars:
    additionalProperties:
      description: the property key is the var name
      type: string
    type: object
  vna:
    properties:
      enabled:
        default: false
        description: enable Virtual Network Assistant (using SUB-VNA license). This
          applied to AP / Switch / Gateway
        type: boolean
    type: object
  vrf_instances:
    additionalProperties:
      $ref: ./ap_port_config.yaml
    description: the property key is the network name
    type: object
  vrrp_groups:
    additionalProperties:
      $ref: ./ap_port_config.yaml
    description: the property key is the vrrp group
    type: object
  vs_instances:
    additionalProperties:
      properties:
        networks:
          items:
            example: guest
            type: string
          type: array
      type: object
    description: 'virtual-switch (for EX92xx and QFX5130)

      all the networks not included here will be placed in default `evpn_vs` virtual-switch
      RI

      Property key is the instance name'
    type: object
  wan_vna:
    properties:
      enabled:
        default: false
        type: boolean
    type: object
  watched_station_url:
    readOnly: true
    type: string
  whitelist_url:
    readOnly: true
    type: string
  wids:
    $ref: ./ap_port_config.yaml
  wifi:
    $ref: ./ap_port_config.yaml
  wired_vna:
    properties:
      enabled:
        default: false
        type: boolean
    type: object
  zone_occupancy_alert:
    $ref: ./ap_port_config.yaml
