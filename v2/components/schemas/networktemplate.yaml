description: Network Template
properties:
  additional_config_cmds:
    items:
      type: string
    type: array
  created_time:
    readOnly: true
    type: number
  dhcp_snooping:
    $ref: ./junos_dhcp_snooping.yaml
  dns_servers:
    items:
      type: string
    type: array
  dns_suffix:
    items:
      type: string
    type: array
  extra_routes:
    additionalProperties:
      description: Property key is the destination CIDR or network name
      properties:
        via:
          description: Next-hop address
          type: string
      type: object
    type: object
  group_tags:
    type: object
  id:
    format: uuid
    readOnly: true
    type: string
  import_org_networks:
    description: Org Networks that we'd like to import
    items:
      example: ap
      type: string
    type: array
  mist_nac:
    description: enable mist_nac to use radsec
    properties:
      enabled:
        type: boolean
      network:
        type: string
    type: object
  modified_time:
    readOnly: true
    type: number
  name:
    type: string
  networks:
    additionalProperties:
      properties:
        subnet:
          example: 192.168.1.0/24
          type: string
        vlan_id:
          example: 10
          type: integer
      type: object
    description: The property key is network name
    type: object
  ntp_servers:
    items:
      type: string
    type: array
  org_id:
    format: uuid
    readOnly: true
    type: string
  port_usages:
    additionalProperties:
      $ref: ./junos_dhcp_snooping.yaml
    description: The property key is the port profile name
    properties:
      dynamic:
        $ref: ./junos_dhcp_snooping.yaml
    type: object
  radius_config:
    $ref: ./junos_dhcp_snooping.yaml
  remote_syslog:
    $ref: ./junos_dhcp_snooping.yaml
  snmp_config:
    $ref: ./junos_dhcp_snooping.yaml
  switch_matching:
    $ref: ./junos_dhcp_snooping.yaml
  switch_mgmt:
    properties:
      config_revert:
        default: 10
        type: integer
      protect_re:
        properties:
          enabled:
            default: false
            type: boolean
        type: object
      root_password:
        type: string
      tacacs:
        properties:
          acct_servers:
            items:
              properties:
                host:
                  type: string
                port:
                  type: string
                secret:
                  type: string
                timeout:
                  default: 10
                  type: integer
              type: object
            type: array
          enabled:
            type: boolean
          network:
            type: string
          tacplus_servers:
            items:
              properties:
                host:
                  type: string
                port:
                  type: string
                secret:
                  type: string
                timeout:
                  default: 10
                  type: integer
              type: object
            type: array
        type: object
    type: object
  vrf_config:
    properties:
      enabled:
        default: false
        type: boolean
    type: object
  vrf_instances:
    additionalProperties:
      properties:
        extra_routes:
          additionalProperties:
            properties:
              via:
                description: Next-hop address
                type: string
            type: object
          description: Property key is the destination CIDR (e.g. "10.0.0.0/8")
          type: object
        networks:
          items:
            type: string
          type: array
      type: object
    description: Property key is the VRF name
    type: object
title: networktemplate
type: object
x-examples:
  example-1:
    name: string
    networks:
      dns:
      - string
      dns_suffix:
      - string
      gateway: string
      subnet: string
      vlan_id: 1
    port_usages:
      eth0:
        all_networks: true
        bypass_auth_when_server_down: true
        description: string
        disable_autoneg: true
        disabled: true
        duplex: half
        enable_mac_auth: true
        guest_network: string
        mac_limit: 0
        mode: access
        mtu: 0
        networks:
        - string
        poe_disabled: true
        port_auth: string
        port_network: string
        speed: string
        storm_control:
          no_broadcast: true
          no_multicast: true
          no_registered_multicast: true
          no_unknown_unicast: true
          percentage: 0
        stp_edge: true
        voip_network: string
    radius_config:
      acct_interim_interval: 0
      acct_servers:
      - host: string
        port: 0
        secret: string
      auth_servers:
      - host: string
        port: 0
        secret: string
      auth_servers_retries: 0
      auth_servers_timeout: 0
    switch_matching:
      enable: true
      rules:
      - additional_config_cmds:
        - string
        match_model: string
        match_name[0:3]: string
        match_role: string
        name: string
        port_config:
          aggregated: true
          description: string
          dynamic_usage: true
          usage: string
    switch_mgmt:
      config_revert_timer: 0
