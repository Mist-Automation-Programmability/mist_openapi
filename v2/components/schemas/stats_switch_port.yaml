description: Switch port statistics
properties:
  for_site:
    readOnly: true
    type: boolean
  mac:
    readOnly: true
    type: string
  neighbor_mac:
    description: chassis identifier of the chassis type listed
    readOnly: true
    type: string
  neighbor_port_desc:
    description: "description supplied by the system on the interface E.g. \u201C\
      GigabitEthernet2/0/39\u201D"
    readOnly: true
    type: string
  neighbor_system_name:
    description: "name supplied by the system on the interface E.g. neighbor system\
      \ name E.g. \u201CKumar-Acc-SW.mist.local\u201D"
    readOnly: true
    type: string
  org_id:
    format: uuid
    readOnly: true
    type: string
  poe_disabled:
    description: is the POE configured not be disabled.
    readOnly: true
    type: boolean
  port_id:
    readOnly: true
    type: string
  port_mac:
    description: interface mac address
    readOnly: true
    type: string
  rx_bytes:
    description: rx bytes
    readOnly: true
    type: integer
  rx_pkts:
    description: rx packets
    readOnly: true
    type: integer
  site_id:
    format: uuid
    readOnly: true
    type: string
  speed:
    description: port speed
    readOnly: true
    type: integer
  tx_bytes:
    description: tx bytes
    readOnly: true
    type: integer
  tx_pkts:
    description: tx packets
    readOnly: true
    type: integer
  up:
    description: indicates if interface is up
    readOnly: true
    type: boolean
  xcvr_part_number:
    type: string
required:
- mac
- neighbor_mac
- org_id
- port_id
- port_mac
- rx_bytes
- rx_pkts
- site_id
- tx_bytes
- tx_pkts
title: stats_switch_port
type: object
