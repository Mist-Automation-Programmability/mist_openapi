description: An organization usualy represents a customer - which has inventories,
  licenses. An Organization can contain multiple sites. A site usually represents
  a deployment at the same location (a campus, an office).
properties:
  alarmtemplate_id:
    format: uuid
    nullable: true
    type: string
  allow_mist:
    default: true
    type: boolean
  created_time:
    readOnly: true
    type: number
  id:
    format: uuid
    readOnly: true
    type: string
  modified_time:
    readOnly: true
    type: number
  msp_id:
    format: uuid
    nullable: true
    readOnly: true
    type: string
  name:
    type: string
  orggroup_ids:
    items:
      format: uuid
      type: string
    type: array
  session_expiry:
    default: 1440
    type: number
required:
- name
title: org
type: object
