description: 'Switch Configuration

  You can configure `port_usages` and `networks` settings at the device level, but
  most of the time it''s better use the Site Setting to achieve better consistency
  and be able to re-use the same settings across switches entries defined here will
  "replace" those defined in Site Setting/Network Template'
properties:
  acl_policies:
    items:
      $ref: ./junos_acl_policies.yaml
    type: array
  acl_tags:
    additionalProperties:
      $ref: ./junos_acl_policies.yaml
    description: ACL Tags to identify traffic source or destination. Key name is the
      tag name
    properties:
      any:
        description: implicit, cannot override
        properties:
          type:
            default: a
            type: string
        type: object
    type: object
  additional_config_cmds:
    items:
      type: string
    type: array
  created_time:
    readOnly: true
    type: number
  deviceprofile_id:
    format: uuid
    type: string
  dhcp_config:
    $ref: ./junos_acl_policies.yaml
  dhcp_snooping:
    $ref: ./junos_acl_policies.yaml
  disable_auto_config:
    default: false
    description: for a claimed switch, we control the configs by default. This option
      (disables the behavior)
    type: boolean
  dns_servers:
    description: Global dns settings. To keep compatibility, dns settings in `ip_config`
      and `oob_ip_config` will overwrite this setting
    items:
      type: string
    type: array
  dns_suffix:
    description: Global dns settings. To keep compatibility, dns settings in `ip_config`
      and `oob_ip_config` will overwrite this setting
    items:
      type: string
    type: array
  evpn_config:
    $ref: ./junos_acl_policies.yaml
  extra_routes:
    additionalProperties:
      properties:
        via:
          description: next-hop IP Address
          type: string
      type: object
    description: Property key is the network name or a CIDR
    type: object
  id:
    format: uuid
    readOnly: true
    type: string
  image1_url:
    nullable: true
    type: string
  image2_url:
    nullable: true
    type: string
  image3_url:
    nullable: true
    type: string
  ip_config:
    $ref: ./junos_acl_policies.yaml
  managed:
    default: false
    description: "for an adopted switch, we don\u2019t overwrite their existing configs\
      \ automatically"
    type: boolean
  modified_time:
    readOnly: true
    type: number
  name:
    type: string
  networks:
    $ref: ./junos_acl_policies.yaml
  notes:
    type: string
  ntp_servers:
    description: list of NTP servers specific to this device. By default, those in
      Site Settings will be used
    items:
      type: string
    type: array
  oob_ip_config:
    $ref: ./junos_acl_policies.yaml
  org_id:
    format: uuid
    readOnly: true
    type: string
  ospf_config:
    $ref: ./junos_acl_policies.yaml
  other_ip_configs:
    additionalProperties:
      $ref: ./junos_acl_policies.yaml
    description: Property key is the network name
    type: object
  port_config:
    additionalProperties:
      $ref: ./junos_acl_policies.yaml
    description: Property key is the port name or range (e.g. "ge-0/0/0-10")
    type: object
  port_mirroring:
    properties:
      port_mirror:
        $ref: ./junos_acl_policies.yaml
    type: object
  port_usages:
    additionalProperties:
      $ref: ./junos_acl_policies.yaml
    description: Property key is the port profile name
    properties:
      dynamic:
        $ref: ./junos_acl_policies.yaml
    type: object
  radius_config:
    $ref: ./junos_acl_policies.yaml
  role:
    default: access
    enum:
    - access
    - aggregation
    type: string
  router_id:
    description: used for OSPF / BGP / EVPN
    example: 10.2.1.10
    type: string
  site_id:
    format: uuid
    readOnly: true
    type: string
  switch_mgmt:
    properties:
      config_revert_timer:
        default: 10
        description: rollback timer for commit confirmed
        maximum: 30
        minimum: 1
        type: integer
      protect_re:
        description: "restrict inbound-traffic to host\nwhen enabled, all traffic\
          \ that is not essential to our operation will be dropped \ne.g. ntp / dns\
          \ / traffic to mist will be allowed by default, if dhcpd is enabled, we'll\
          \ make sure it works"
        properties:
          allowed_services:
            description: optionally, services we'll allow
            items:
              example: e
              type: string
            type: array
          custom:
            items:
              properties:
                port_range:
                  default: '0'
                  example: 80,1035-1040
                  type: string
                protocol:
                  default: any
                  enum:
                  - tcp
                  - udp
                  - icmp
                  - any
                  example: tcp
                  type: string
                subnets:
                  items:
                    example: 10.1.2.0/24
                    type: string
                  type: array
              type: object
            type: array
          enabled:
            type: boolean
          trusted_hosts:
            description: optionally, host/subnets we'll allow traffic to/from
            items:
              example: 10.242.3.0/24
              type: string
            type: array
        type: object
      root_password:
        type: string
    type: object
  use_router_id_as_source_ip:
    default: false
    description: whether to use it for snmp / syslog / tacplus / radius
    type: boolean
  vars:
    description: a dictionary of name->value, the vars can then be used in Wlans.
      This can overwrite those from Site Vars
    type: object
  virtual_chassis:
    description: required for preprovisioned Virtual Chassis
    properties:
      members:
        description: list of Virtual Chassis mem
        items:
          properties:
            mac:
              description: fpc0, same as the mac of device_id
              example: aff827549235
              type: string
            vc_role:
              description: Both vc_role master and backup will be matched to routing-engine
                role in Junos preprovisioned VC config
              enum:
              - master
              - linecard
              - backup
              type: string
          type: object
        type: array
      preprovisioned:
        default: false
        description: to configure whether the VC is preprovisioned or nonprovisioned
        type: boolean
    type: object
  vrf_config:
    $ref: ./junos_acl_policies.yaml
  vrrp_config:
    $ref: ./junos_acl_policies.yaml
title: device_switch
type: object
x-examples:
  device-switch-settings:
    additional_config_cmds:
    - set snmp community public
    deviceprofile_id: 6f4bf402-45f9-2a56-6c8b-7f83d3bc98e9
    disable_auto_config: false
    extra_routes:
    - dest: 172.16.3.0/24
      via: 10.2.1.1
    - dest: it_mgmt
      via: 10.2.1.1
    image1_url: https://url/to/image.png
    ip_config:
      dns:
      - 8.8.8.8
      - 4.4.4.4
      dns_suffix:
      - .mist.local
      - .mist.com
      gateway: 10.2.1.254
      ip: 10.2.1.10
      netmask: 255.255.255.0
      network: default
      type: static
    managed: false
    name: corp-a135
    notes: slightly off center
    ntp_servers:
    - pool.ntp.org
    - time.google.com
    oob_ip_config: {}
    ospf:
      '0':
        networks:
        - corp
        - iot
        nssa: false
        stub: false
    other_ip_configs:
      guest:
        ip: 10.3.3.1
        netmask: 255.255.255.0
        type: static
    port_config:
      '*':
        usage: default
      ge-0/0/0:
        aggregated: true
        description: to dist-sw-01
        usage: uplink
      ge-0/0/1:
        dynamic_usage: dynamic
        usage: default
      ge-0/0/8-16,ge-1/0/0-47:
        usage: ap
    radius_config:
      acct_interim_interval: 0
      acct_servers:
      - host: 1.2.3.4
        port: 1812
        secret: testing123
      auth_servers:
      - host: 1.2.3.4
        port: 1812
        secret: testing123
      - host: radius.internal
        port: 1812
        secret: testing123
      auth_servers_retries: 3
      auth_servers_timeout: 5
    role: access
    router_id: 10.2.1.10
    vars:
      RADIUS_IP1: 172.31.2.5
      RADIUS_SECRET: 11s64632d
