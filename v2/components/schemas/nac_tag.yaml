properties:
  created_time:
    readOnly: true
    type: number
  egress_vlan_names:
    description: if `type`==`egress_vlan_names`, list of egress vlans to return
    example:
    - 1vlan-30
    - 1vlan-20
    - 2-vlan10
    items:
      type: string
    type: array
  gbp_tag:
    description: if `type`==`gbp_tag`
    type: integer
  id:
    format: uuid
    readOnly: true
    type: string
  match:
    description: if `type`==`match`
    enum:
    - cert_cn
    - cert_issuer
    - cert_san
    - cert_serial
    - cert_sub
    - client_mac
    - idp_role
    - mdm_status
    - radius_group
    - realm
    - ssid
    - user_name
    minLength: 1
    type: string
  modified_time:
    readOnly: true
    type: number
  name:
    minLength: 1
    type: string
  org_id:
    format: uuid
    readOnly: true
    type: string
  radius_attrs:
    description: "if `type`==`radius_attrs`, user can specify a list of one or more\
      \ standard attributes in the field \"radius_attrs\". \nIt is the responsibility\
      \ of the user to provide a  syntactically correct string, otherwise it may not\
      \ work as expected.\nNote that it is allowed to have more than one radius_attrs\
      \ in the result of a given rule."
    example:
    - Idle-Timeout=600
    - Termination-Action=RADIUS-Request
    items:
      type: string
    type: array
  radius_group:
    description: if `type`==`radius_group`
    type: string
  radius_vendor_attrs:
    description: "if `type`==`radius_vendor_attrs`, user can specify a list of one\
      \ or more vendor-specific attributes in the field \"radius_vendor_attrs\". \n\
      It is the responsibility of the user to provide a  syntactically correct string,\
      \ otherwise it may not work as expected.\nNote that it is allowed to have more\
      \ than one radius_vendor_attrs in the result of a given rule."
    example:
    - PaloAlto-Admin-Role=superuser
    - PaloAlto-Panorama-Admin-Role=administrator
    items:
      type: string
    type: array
  session_timeout:
    description: if `type`==`session_timeout, in seconds
    example: 86000
    type: integer
  type:
    enum:
    - egress_vlan_names
    - match
    - vlan
    - gbp_tag
    - radius_attrs
    - radius_group
    - radius_vendor_attrs
    - session_timeout
    minLength: 1
    type: string
  values:
    description: if `type`==`match`
    items:
      type: string
    type: array
  vlan:
    description: if `type`==`vlan`
    type: string
required:
- name
- type
title: nac_tag
type: object
x-examples:
  client_mac:
    match: client_mac
    name: cameras
    type: match
    values:
    - '010203040506'
    - abcdef*
  egress_vlan_names:
    egress_vlan_names:
    - 1vlan-30
    - 1vlan-20
    - 2-vlan10
    type: egress_vlan_names
  matches mdm_status:
    match: mdm_status
    name: mdm_compliance
    type: match
    values:
    - compliant
    - non-compliant
    - unknown
  matches_cert_cn:
    match: cert_cn
    name: staff
    type: match
    values:
    - john
    - staff*
  matches_cert_issuer:
    match: cert_issuer
    name: issuer1
    type: match
    values:
    - /C=CN/ST=defy/L=defy/O=defy/OU=defy/CN=defy
  matches_cert_san:
    match: cert_san
    name: san1
    type: match
    values:
    - henry1@defy.com
  matches_cert_serial:
    match: cert_serial
    name: serial1
    type: match
    values:
    - 6a524ab782fb468c00c59f51cff00268d95533b8
  matches_cert_sub:
    match: cert_sub
    name: subject1
    type: match
    values:
    - /C=CN/ST=defy/O=defy/OU=defy/CN=steve
  matches_radius_group:
    radius_group: VIP
    type: radius_group
  matches_realm:
    match: realm
    name: defy
    type: match
    values:
    - defy.com
  matches_role:
    match: idp_role
    name: VIP
    type: match
    values:
    - vip
  matches_username:
    match: user_name
    name: admins
    type: match
    values:
    - bob
    - steve
  matches_vendor:
    match: vendor
    name: guest-wlan
    type: match
    values:
    - cisco
  matches_vlan:
    type: vlan
    vlan: '30'
  radius_attrs:
    radius_attrs:
    - Idle-Timeout=600
    - Termination-Action=RADIUS-Request
    type: radius_attrs
  radius_vendor_attrs:
    radius_vendor_attrs:
    - PaloAlto-Admin-Role=superuser
    - PaloAlto-Panorama-Admin-Role=administrator
    type: radius_vendor_attrs
  session_timeout:
    session_timeout: 86400
    type: session_timeout
