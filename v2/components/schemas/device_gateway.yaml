description: device gateway
properties:
  additional_config_cmds:
    items:
      type: string
    type: array
  created_time:
    readOnly: true
    type: number
  deviceprofile_id:
    format: uuid
    type: string
  dhcpd_config:
    $ref: ./junos_dhcpd.yaml
  extra_routes:
    additionalProperties:
      properties:
        via:
          type: string
      type: object
    description: Property key is the destination
    minProperties: 0
    type: object
  for_site:
    readOnly: true
    type: boolean
  id:
    format: uuid
    readOnly: true
    type: string
  image1_url:
    type: string
  image2_url:
    type: string
  image3_url:
    type: string
  ip_config:
    $ref: ./junos_dhcpd.yaml
  managed:
    type: boolean
  modified_time:
    readOnly: true
    type: number
  msp_id:
    format: uuid
    readOnly: true
    type: string
  name:
    type: string
  networks:
    additionalProperties:
      properties:
        vlan_id:
          type: integer
      type: object
    description: Property key is the network name or a CIDR
    minProperties: 0
    type: object
  ntp_servers:
    items:
      type: string
    type: array
  oob_ip_config:
    $ref: ./junos_dhcpd.yaml
  org_id:
    format: uuid
    readOnly: true
    type: string
  port_config:
    additionalProperties:
      $ref: ./junos_dhcpd.yaml
    description: Property key is the port name or range (e.g. "ge-0/0/0-10")
    type: object
  port_mirroring:
    properties:
      port_mirror:
        properties:
          family_type:
            type: string
          ingress_port_ids:
            items:
              example: ge-0/0/3
              type: string
            type: array
          output_port_id:
            example: ge-0/0/5
            type: string
          rate:
            type: integer
          run_length:
            minimum: 0
            type: integer
        type: object
    type: object
  site_id:
    format: uuid
    readOnly: true
    type: string
  vars:
    minProperties: 0
    type: object
