description: Junos OSPF areas
properties:
  include_loopback:
    default: false
    type: boolean
  networks:
    additionalProperties:
      properties:
        auth_keys:
          additionalProperties:
            type: string
          description: if `auth_type`==`md5`. Property key is the key number
          type: object
        auth_password:
          description: if `auth_type`==`password`, the password, max length is 8
          type: string
        auth_type:
          default: none
          description: auth type
          enum:
          - none
          - md5
          - password
          type: string
        bfd_minimum_interval:
          example: 500
          maximum: 255000
          minimum: 1
          type: integer
        dead_interval:
          maximum: 65535
          minimum: 1
          type: integer
        hello_interval:
          maximum: 255
          minimum: 1
          type: integer
        interface_type:
          default: broadcast
          description: interface type (nbma = non-broadcast multi-access)
          enum:
          - broadcast
          - nbma
          - p2p
          - p2mp
          type: string
        metric:
          example: 10000
          maximum: 65535
          minimum: 1
          nullable: true
          type: integer
        passive:
          default: false
          description: whether to send OSPF-Hello
          type: boolean
      type: object
    description: "Networks to participate in an OSPF area. \nProperty key is the network\
      \ name"
    example:
      corp:
        auth_keys:
          '1': auth-key-1
        auth_type: md5
        bfd_minimum_interval: 500
        dead_interval: 40
        hello_interval: 10
        interface_type: nbma
        metric: 10000
      guest:
        passive: true
    type: object
  type:
    default: default
    description: OSPF type, default (default) / stub / nssa
    enum:
    - default
    - stub
    - nssa
    example: default
    type: string
title: junos_ospf_areas
type: object
x-examples:
  example-1:
    networks:
      '{network_name}':
        auth_keys:
          '{key}': string
        auth_password: string
        auth_type: none
        interface_type: nbma
        passive: true
    type: default
