properties:
  accounts:
    description: List of linked apps(zoom/teams) account details
    items:
      properties:
        account_id:
          description: Linked apps(zoom/teams/intune/jamf) tenant id
          example: kojzWgIJQ0ujR73VvydOdg
          type: string
        error:
          description: This error is provided only when the apps(zoom) account refresh
            token fails in the backend
          example: OAuth token refresh failed, please re-link your account
          type: string
        errors:
          items:
            example: OAuth token refresh failed, please re-link your account", "API
              daily rate limit reached for your account
            type: string
          type: array
        last_status:
          oneOf:
          - type: integer
          - example: failed
            type: string
        last_sync:
          oneOf:
          - type: integer
          - example: '1665465346000'
            type: string
        linked_by:
          description: First name of the user who linked the apps(zoom/teams/intune/jamf)
            account
          example: Testname2
          type: string
        max_daily_api_requests:
          description: This field is specific to Zoom app
          nullable: true
          type: integer
        name:
          description: Name of the company whose (zoom/teams/intune/jamf) account
            mist has subscribed to
          example: Test Compay2 Ltd
          type: string
      type: object
    type: array
  authorization_url:
    description: Only if `forward_url` is set in the request
    type: string
  linked:
    description: OAuth application linked status, is mist portal authorized with the
      OAuth appliation
    type: boolean
title: oauth_app_status
type: object
