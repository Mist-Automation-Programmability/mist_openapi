additionalProperties:
  properties:
    dns_servers:
      description: if `type`==`local` - optional, if not defined, system one will
        be used
      items:
        type: string
      type: array
    dns_suffix:
      description: if `type`==`local` - optional, if not defined, system one will
        be used
      items:
        type: string
      type: array
    fixed_bindings:
      additionalProperties:
        properties:
          ip:
            type: string
          name:
            type: string
        type: object
      description: Property key is the MAC Address
      type: object
    gateway:
      description: if `type`==`local` - optional, `ip` will be used if not provided
      type: string
    ip_end:
      description: if `type`==`local`
      type: string
    ip_start:
      description: if `type`==`local`
      type: string
    options:
      additionalProperties:
        properties:
          type:
            enum:
            - string
            - boolean
            - ip
            - hex
            - int16
            - int32
            - uint16
            - uint32
            type: string
          value:
            type: string
        type: object
      description: Property key is the DHCP option number
      type: object
    servers:
      description: if `type`==`relay`
      items:
        type: string
      type: array
    type:
      default: local
      description: DHCP Server (local) or DHCP Relay (relay)
      enum:
      - local
      - relay
      type: string
    vendor_encapulated:
      additionalProperties:
        properties:
          type:
            enum:
            - string
            - boolean
            - ip
            - hex
            - int16
            - int32
            - uint16
            - uint32
            type: string
          value:
            type: string
        type: object
      description: 'Property key is <enterprise number>:<sub option code>, with

        * enterprise number: 1-65535  (https://www.iana.org/assignments/enterprise-numbers/enterprise-numbers)

        * sub option code: 1-255, sub-option code'
      type: object
  type: object
description: if DHCP Server/Relay is intended. Property key is the network name
properties:
  enabled:
    type: boolean
title: junos_dhcpd
type: object
x-examples:
  DHCP Relay:
    value:
      corp:
        servers:
        - 11.2.3.4
        type: relay
      enabled: true
  DHCP Server:
    value:
      corp:
        dns_servers:
        - 8.8.8.8
        - 4.4.4.4
        dns_suffix:
        - .mist.local
        - .mist.com
        fixed_bindings:
          5684dae9ac8b:
            ip: 192.168.70.35
            name: John
        gateway: 192.168.70.1
        ip_end: 192.168.70.200
        ip_start: 192.168.70.100
        type: local
      enabled: true
  example-1:
    value:
      enabled: true
      property1:
        dns_servers:
        - string
        dns_suffix:
        - string
        fixed_bindings:
          property1:
            ip: string
            name: string
          property2:
            ip: string
            name: string
        gateway: string
        ip_end: string
        ip_start: string
        servers:
        - string
        type: local
      property2:
        dns_servers:
        - string
        dns_suffix:
        - string
        fixed_bindings:
          property1:
            ip: string
            name: string
          property2:
            ip: string
            name: string
        gateway: string
        ip_end: string
        ip_start: string
        servers:
        - string
