description: Zone statistics
properties:
  assets_waits:
    description: ble asset wait time right now
    properties:
      avg:
        description: average wait time in seconds
        type: number
      max:
        description: longest wait time in seconds
        type: number
      min:
        description: shortest wait time in seconds
        type: number
      p95:
        description: 95th percentile of all the wait time(s)
        type: number
    type: object
  clients_waits:
    description: client wait time right now
    properties:
      avg:
        description: average wait time in seconds
        type: number
      max:
        description: longest wait time in seconds
        type: number
      min:
        description: shortest wait time in seconds
        type: number
      p95:
        description: 95th percentile of all the wait time(s)
        type: number
    type: object
  created_time:
    type: integer
  id:
    description: id of the zone
    format: uuid
    type: string
  map_id:
    description: map_id of the zone
    format: uuid
    type: string
  modified_time:
    type: integer
  name:
    description: name of the zone
    type: string
  num_assets:
    description: number of assets
    type: integer
  num_clients:
    description: number of wifi clients (unconnected + connected)
    type: integer
  num_sdkclients:
    description: number of sdk clients
    type: integer
  occupancy_limit:
    type: integer
  org_id:
    type: string
  sdkclients_waits:
    description: sdkclient wait time right now
    properties:
      avg:
        description: average wait time in seconds
        type: number
      max:
        description: longest wait time in seconds
        type: number
      min:
        description: shortest wait time in seconds
        type: number
      p95:
        description: 95th percentile of all the wait time(s)
        type: number
    type: object
  site_id:
    type: string
required:
- id
- map_id
- name
title: stats_zone
type: object
