description: Gateway Template is applied to a site for gateway(s) in a site.
properties:
  additional_config_cmds:
    items:
      type: string
    type: array
  bgp_config:
    additionalProperties:
      $ref: ./junos_bgp_config.yaml
    type: object
  created_time:
    readOnly: true
    type: number
  dhcpd_config:
    additionalProperties:
      properties:
        dns_servers:
          items:
            format: ipv4
            type: string
          type: array
        dns_suffix:
          items:
            type: string
          type: array
        fixed_bindings:
          additionalProperties:
            properties:
              ip:
                format: ipv4
                type: string
              name:
                type: string
            required:
            - ip
            type: object
          description: The property key is the device MAC address
          type: object
        gateway:
          format: ipv4
          type: string
        ip_end:
          format: ipv4
          type: string
        ip_start:
          format: ipv4
          type: string
        servers:
          items:
            format: ipv4
            type: string
          type: array
        type:
          default: local
          enum:
          - local
          - relay
          type: string
      type: object
    description: The property key is the network name
    type: object
  extra_routes:
    additionalProperties:
      description: The property key is a CIDR or name from `networks`
      properties:
        via:
          format: ipv4
          type: string
      type: object
    type: object
  gateway_matching:
    $ref: ./junos_bgp_config.yaml
  id:
    format: uuid
    readOnly: true
    type: string
  idp_profiles:
    description: Property key is the profile name
    properties:
      additionalProperties:
        $ref: ./junos_bgp_config.yaml
    type: object
  ip_configs:
    additionalProperties:
      properties:
        ip:
          format: ipv4
          type: string
        netmask:
          example: /24
          type: string
      type: object
    description: The property key is the network name
    type: object
  modified_time:
    readOnly: true
    type: number
  name:
    type: string
  networks:
    additionalProperties:
      $ref: ./junos_bgp_config.yaml
    description: The property key is the network name
    type: object
  oob_ip_config:
    $ref: ./junos_bgp_config.yaml
  org_id:
    format: uuid
    readOnly: true
    type: string
  path_preferences:
    additionalProperties:
      description: The property key is the path name
      properties:
        paths:
          properties:
            cost:
              type: integer
            gateway_ip:
              description: if `type`==`local`, if a different gateway is desired
              type: string
            internet_access:
              default: false
              description: when `type`==`vpn`, if this vpn path can be used for internet
              type: boolean
            name:
              type: string
            networks:
              description: if `type`==`local`
              items:
                type: string
              type: array
            target_ips:
              description: if `type`==`local`, if destination IP is to be replaced
              items:
                type: string
              type: array
            type:
              enum:
              - local
              - wan
              - vpn
              - tunnel
              type: string
          type: object
        strategy:
          default: ordered
          enum:
          - ordered
          - weighted
          - ecmp
          type: string
      type: object
    description: experimental
    type: object
  port_config:
    additionalProperties:
      $ref: ./junos_bgp_config.yaml
    description: The property key is the port(s) name or range (e.g. "ge-0/0/0-10")
    type: object
  routing_policies:
    additionalProperties:
      $ref: ./junos_bgp_config.yaml
    description: The property key is the routing policy name
    type: object
  service_policies:
    items:
      properties:
        action:
          default: allow
          enum:
          - allow
          - deny
          type: string
        ewf:
          items:
            properties:
              alert_only:
                type: boolean
              block_message:
                example: Access to this URL Category has been blocked
                type: string
              enabled:
                default: false
                type: boolean
              profille:
                default: strict
                enum:
                - strict
                - standard
                type: string
            type: object
          type: array
        idp:
          $ref: ./junos_bgp_config.yaml
        local_routing:
          default: false
          description: access within the same VRF
          type: boolean
        name:
          type: string
        path_preferences:
          description: 'by default, we derive all paths available and use them

            optionally, you can customize by using `path_preference`'
          type: string
        servicepolicy_id:
          description: used to link servicepolicy defined at org level and overwrite
            some attributes
          format: uuid
          type: string
        services:
          items:
            type: string
          type: array
        tenants:
          items:
            type: string
          type: array
      type: object
    type: array
  tunnel_configs:
    additionalProperties:
      $ref: ./junos_bgp_config.yaml
    description: Property key is the tunnel name
    type: object
  type:
    default: standalone
    enum:
    - standalone
    - spoke
    - hub
    type: string
required:
- name
