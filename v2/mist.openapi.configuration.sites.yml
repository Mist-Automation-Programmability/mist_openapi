  /api/v1/sites/{site_id}/devices/{device_id}/ping:
    parameters:
    - $ref: '#/components/parameters/site_id'
    - $ref: '#/components/parameters/device_id'
    post:
      description: "Ping from AP, Switch and SSR\n\nPing can be performed from the\
        \ Device. The output will be available through websocket. As there can be\
        \ multiple command issued against the same AP at the same time and the output\
        \ all goes through the same websocket stream, session is introduced for demux.\n\
        \n#### Subscribe to Device Command outputs\n`WS /api-ws/v1/stream`\n\n```json\n\
        {\n    \"subscribe\": \"/sites/{site_id}/devices/{device_id}/cmd\"\n}\n```\n\
        ##### Example output from ws stream\n```json\n{\n    \"event\": \"data\",\n\
        \    \"channel\": \"/sites/4ac1dcf4-9d8b-7211-65c4-057819f0862b/devices/00000000-0000-0000-1000-5c5b350e0060/cmd\"\
        ,\n    \"data\": {\n        \"session\": \"session_id\",\n        \"raw\"\
        : \"64 bytes from 23.211.0.110: seq=8 ttl=58 time=12.323 ms\\n\"\n    }\n\
        }\n```"
      operationId: pingFromDevice
      requestBody:
        content:
          application/json:
            examples:
              example-1:
                value:
                  count: 10
                  host: 1.1.1.1
            schema:
              properties:
                count:
                  default: 10
                  type: integer
                egress_interface:
                  description: Interface through which packet needs to egress
                  type: string
                host:
                  example: 1.1.1.1
                  format: ipv4
                  type: string
                node:
                  description: Only for HA
                  enum:
                  - node0
                  - node1
                  type: string
                size:
                  default: 56
                  maximum: 65535
                  minimum: 56
                  type: integer
              required:
              - host
              type: object
        description: Request Body
      responses:
        '200':
          $ref: '#/components/responses/Session'
        '400':
          content:
            application/json:
              schema:
                properties: {}
                type: object
          description: The API endpoint exists but its syntax/payload is incorrect,
            detail may be given
        '401':
          content:
            application/json:
              examples:
                Unauthorized:
                  value:
                    detail: Authentication credentials were not provided.
              schema:
                properties:
                  detail:
                    type: string
                type: object
          description: Unauthorized
        '403':
          content:
            application/json:
              examples:
                Permission Denied:
                  value:
                    detail: You do not have permission to perform this action.
              schema:
                properties:
                  detail:
                    type: string
                type: object
          description: Permission Denied
        '404':
          content:
            application/json:
              examples:
                Unauthorized:
                  value:
                    detail: Not found.
              schema:
                properties:
                  detail:
                    type: string
                type: object
          description: Not found. The API endpoint doesn't exist or resource doesn't
            exist
      summary: pingFromDevice
      tags:
      - Sites Devices Utilities
      - Configuration
