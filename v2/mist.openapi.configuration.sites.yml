        \ action will be taken"
      operationId: bulkAssignSiteApsToMap
      requestBody:
        content:
          application/json:
            examples:
              Example 1:
                value:
                  device_ids:
                  - 5c5b35000001
                  - 5c5b35584a6f
            schema:
              properties:
                device_ids:
                  items:
                    example: 5c5b35000001
                    type: string
                  type: array
              type: object
              x-examples:
                Example 1:
                  device_ids:
                  - 00000000-0000-0000-1000-5c5b35000001
                  - 00000000-0000-0000-1000-5c5b35584a6f
      responses:
        '200':
          content:
            application/json:
              examples:
                Example 1:
                  value:
                    locked:
                    - 5c5b35584a6f
                    moved:
                    - 5c5b35000001
              schema:
                properties:
                  locked:
                    items:
                      example: 5c5b35584a6f
                      type: string
                    type: array
                  moved:
                    items:
                      example: 5c5b35000001
                      type: string
                    type: array
                type: object
                x-examples:
                  Example 1:
                    locked:
                    - 00000000-0000-0000-1000-5c5b35000001
                    moved:
                    - 00000000-0000-0000-1000-5c5b35584a6f
