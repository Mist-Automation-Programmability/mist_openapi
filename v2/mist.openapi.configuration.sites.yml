          nullable: true
          type: string
        use_eapol_v1:
          default: false
          description: "if `auth.type`==\u2019eap\u2019 or \u2018psk\u2019, should\
            \ only be set for legacy client, such as pre-2004, 802.11b devices"
          type: boolean
        vlan_enabled:
          default: false
          description: if vlan tagging is enabled
          type: boolean
        vlan_id:
          maximum: 4094
          minimum: 1
          nullable: true
          type: integer
        vlan_ids:
          description: "vlan_ids to use when there\u2019s no match from RA"
          example:
          - 3
          - 4
          - 5
          items:
            default: 999
            maximum: 4094
            minimum: 1
            nullable: true
            type: integer
          type: array
        vlan_pooling:
          default: false
          description: vlan pooling allows AP to place client on different VLAN using
            a deterministic algorithm
          type: boolean
        wlan_limit_down:
          description: kbps
          type: integer
        wlan_limit_down_enabled:
          default: false
