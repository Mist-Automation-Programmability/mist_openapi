              examples:
                Unauthorized:
                  value:
                    detail: Not found.
              schema:
                properties:
                  detail:
                    type: string
                type: object
          description: Not found. The API endpoint doesn't exist or resource doesn't
            exist
      summary: createSiteDeviceHaCluster
      tags:
      - Sites Devices WAN Edges HA
      - Configuration
