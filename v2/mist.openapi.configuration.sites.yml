          format: uri
          nullable: true
          type: string
        portal_sso_url:
          nullable: true
          type: string
        portal_template_url:
          description: N.B portal_template will be forked out of wlan objects soon.
            To fetch portal_template, please query portal_template_url. To update
            portal_template, use Wlan Portal Template.
          nullable: true
          readOnly: true
          type: string
        qos:
          properties:
            class:
              default: best_effort
              enum:
              - background
              - best_effort
              - video
              - voice
              example: best_effort
              type: string
            overwrite:
              default: false
              description: whether to overwrite QoS
              type: boolean
          type: object
        radsec:
