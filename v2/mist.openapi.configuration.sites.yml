          description: Property key is a CIDR
          type: object
        tunterm_igmp_snooping_config:
          properties:
            enabled:
              default: false
              type: boolean
            querier:
              properties:
                max_response_time:
                  description: "querier\u2019s query response interval, in tenths-of-seconds"
                  example: 10
                  type: integer
                mtu:
                  description: the MTU we use (needed when forming large IGMPv3 Reports)
                  example: 1500
                  type: integer
                query_interval:
                  description: "querier\u2019s query interval, in seconds"
                  example: 125
                  type: integer
                robustness:
                  description: "querier\u2019s robustness "
                  maximum: 7
                  minimum: 1
                  type: integer
                version:
                  description: "querier\u2019s maximum protocol version"
                  example: 3
                  type: integer
              type: object
            vlan_ids:
              description: the list of vlans on which tunterm performs IGMP snooping
              items:
                example: 2
                type: integer
              type: array
          type: object
        tunterm_ip_config:
          description: ip configuration of the Mist Tunnel interface
          properties:
            gateway:
              example: 10.2.1.254
              type: string
            ip:
              description: untagged VLAN
              example: 10.2.1.1
              type: string
            netmask:
              example: 255.255.255.0
              type: string
          required:
          - gateway
          - ip
          - netmask
          type: object
        tunterm_monitoring:
          items:
            $ref: ./components/schemas/site_tunterm_monitoring.yaml
          type: array
        tunterm_multicast_config:
          properties:
            mdns:
              properties:
                enabled:
                  type: boolean
                vlan_ids:
                  items:
                    type: string
                  type: array
              type: object
            ssdp:
              properties:
                enabled:
                  type: boolean
                vlan_ids:
                  items:
                    type: string
                  type: array
              type: object
          type: object
        tunterm_other_ip_configs:
          additionalProperties:
            properties:
              ip:
                type: string
              netmask:
                type: string
            required:
            - ip
            - netmask
            type: object
          description: ip configs by VLAN ID. Property key is the VLAN ID
          type: object
        tunterm_port_config:
          description: ethernet port configurations
          properties:
            downstream_ports:
              description: list of ports to be used for downstream (to AP) purpose
              items:
                type: string
              type: array
            separate_upstream_downstream:
              default: false
              description: weather to separate upstream / downstream ports. default
                is false where all ports will be used.
              type: boolean
            upstream_port_vlan_id:
              default: 1
              description: native VLAN id for upstream ports
              example: 30
              type: integer
            upstream_ports:
              description: list of ports to be used for upstrea purpose (to LAN)
              items:
                type: string
              type: array
          type: object
        tunterm_registered:
          readOnly: true
          type: boolean
        tunterm_switch_config:
          additionalProperties:
            properties:
              port_vlan_id:
                type: integer
              vlan_ids:
                items:
