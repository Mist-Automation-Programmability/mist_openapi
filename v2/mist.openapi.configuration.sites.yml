    site_ssr:
      properties:
        conductor_hosts:
          items:
            example: '"1.1.1.1", "2.2.2.2"'
            type: string
          type: array
        disable_stats:
          type: boolean
      type: object
      x-examples:
        example-1:
          conductor_hosts:
          - 1.1.1.1
          - 2.2.2.2
          disable_stats: false
    site_switch:
      description: Switch site settings
      properties:
        ap_affinity_threshold:
          default: 10
          description: ap_affinity_threshold ap_affinity_threshold can be added as
            a field under site/setting. By default this value is set to 12. If the
            field is set in both site/setting and org/setting, the value from site/setting
            will be used.
          type: integer
        config_revert_timer:
          default: 10
          description: the rollback timer for commit confirmed
          maximum: 30
          minimum: 1
          type: number
        dhcp_option_fqdn:
          default: false
          description: Enable to provide the FQDN with DHCP option 81
          type: boolean
        mxedge_proxy_host:
          type: string
        mxedge_proxy_port:
          default: 2222
          type: integer
        protect_re:
          description: restrict inbound-traffic to host  (draft)
          properties:
            allowed_services:
              description: optionally, services we'll allow
              items:
                example: '["snmp", "icmp"]'
                type: string
              type: array
            custom:
              items:
                properties:
                  port_range:
                    description: matched dst port, `0` means any
                    maxLength: 6553
                    minLength: 0
                    type: string
                  protocol:
                    default: any
                    enum:
                    - tcp
                    - udp
                    - icmp
                    - any
                    type: string
                  subnets:
                    items:
                      type: string
                    type: array
                type: object
              type: array
            enabled:
              description: 'when enabled, all traffic that is not essential to our
                operation will be dropped

                e.g. ntp / dns / traffic to mist will be allowed by default'
              type: boolean
            trusted_hosts:
              description: when `enabled`==`true`, all traffic that is not essential
                to our operation will be dropped (e.g. if dhcpd is enabled, we'll
                make sure it works)
              items:
                example: '["10.242.3.0/24"]'
                type: string
              type: array
          type: object
        root_password:
          type: string
        tacacs:
          $ref: ./components/schemas/tacacs.yaml
        use_mxedge_proxy:
          description: to use mxedge as proxy
          type: boolean
      type: object
    site_tunterm_monitoring:
      properties:
        host:
          description: can be ip, ipv6, hostname
          example: 10.2.8.15
          minLength: 1
          type: string
        port:
          description: when `protocol`==`tcp`
          example: 80
          type: integer
        protocol:
          enum:
          - arp
          - ping
          - tcp
          example: tcp
          minLength: 1
          type: string
        timeout:
          default: 300
          example: 300
          type: integer
      type: object
      x-examples:
        example-1:
          host: 10.2.8.15
          port: 80
          protocol: ping
          timeout: 300
    site_wids:
      description: WIDS site settings
      properties:
        repeated_auth_failures:
          properties:
            duration:
              description: window where a trigger will be detected and action to be
                taken (in seconds)
              example: 60
              type: number
            threshold:
              description: count of events to trigger
              type: integer
          type: object
      type: object
      x-examples:
        example-1:
          repeated_auth_failures:
            duration: 60
            threshold: 4
    site_wifi:
      description: Wi-Fi site settings
      properties:
        cisco_enabled:
          default: true
          type: boolean
        disable_11k:
          default: false
          description: whether to disable 11k
          type: boolean
        disable_radios_when_power_constrained:
          default: false
          type: boolean
        enable_arp_spoof_check:
          default: false
          description: when proxy_arp is enabled, check for arp spoofing.
          type: boolean
        enable_channel_144:
          default: false
          deprecated: true
          description: whether to enable channel 144 (some older clients may not support
            it)
          type: boolean
        enable_shared_radio_scanning:
          default: true
          type: boolean
        enabled:
          default: true
          description: enable WIFI feature (using SUB-MAN license)
          type: boolean
        locate_connected:
          default: true
          description: whether to locate connected clients
          type: boolean
        locate_unconnected:
          default: false
          description: whether to locate unconnected clients
          type: boolean
        mesh_allow_dfs:
          default: false
          description: whether to allow Mesh to use DFS channels. For DFS channels,
            Remote Mesh AP would have to do CAC when scanning for new Base AP, which
            is slow and will distrupt the connection. If roaming is desired, keep
            it disabled.
          type: boolean
        mesh_enable_crm:
          default: false
          description: used to enable/disable CRM
          type: boolean
        mesh_enabled:
          default: false
          description: whether to enable Mesh feature for the site
          type: boolean
        mesh_psk:
          description: optional passphrase of mesh networking, default is generated
            randomly
          nullable: true
          type: string
        mesh_ssid:
          description: optional ssid of mesh networking, default is based on site_id
          nullable: true
          type: string
        proxy_arp:
          description: default / enabled / disabled
          enum:
          - default
          - enabled
          - disabled
          nullable: true
          type: string
      type: object
      x-examples:
        example-1:
          cisco_enabled: true
          disable_11k: false
          disable_radios_when_power_constrained: false
          enable_arp_spoof_check: false
          enable_shared_radio_scanning: false
          enable_vna: false
          enabled: true
          locate_connected: false
          locate_unconnected: false
          mesh_enabled: true
          proxy_arp: default
    site_zone_occupancy_alert:
      description: Zone Occupancy alert site settings
      properties:
        email_notifiers:
          description: list of email addresses to send email notifications when the
            alert threshold is reached
          example:
          - foo@juniper.net
