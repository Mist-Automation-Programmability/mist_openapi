        site_id:
          format: uuid
          readOnly: true
          type: string
        tunterm_dhcpd_config:
          additionalProperties:
            properties:
              enabled:
                default: false
                type: boolean
              servers:
                description: list of DHCP servers; required if `type`==`relay`
                items:
                  type: string
                type: array
              type:
                default: relay
                enum:
                - relay
                type: string
            type: object
          description: global and per-VLAN. Property key is the VLAN ID
          properties:
            enabled:
              default: false
              type: boolean
            servers:
              description: list of DHCP servers; required if `type`==`relay`
