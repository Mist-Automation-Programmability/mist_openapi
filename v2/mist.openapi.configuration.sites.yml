          - OKC
          - 11r
          example: none
          type: string
        schedule:
          description: WLAN operating schedule, default is disabled
          properties:
            enabled:
              default: false
              type: boolean
            hours:
              additionalProperties:
                type: string
              description: "Property keyis mon / tue / wed / thu / fri / sat / sun\n\
                Property value is time range in \u201CHH:MM-HH:MM\u201D (24-hour format),\
                \ the minimum resolution is 30 minute                 is the 3 letters\
                \ week day (\"mon\", \"tue\", ...)"
              example:
                fri: 09:00-17:00
                mon: 09:00-17:00
              type: object
          type: object
        site_id:
          format: uuid
          readOnly: true
          type: string
        sle_excluded:
          default: false
          description: whether to exclude this WLAN from SLE metrics
          type: boolean
        ssid:
          description: the name of the SSID
          example: corporate
          type: string
        template_id:
          format: uuid
          nullable: true
          type: string
        thumbnail:
