        rx_rate:
          description: RX Rate, Mbps
          type: number
        rx_retries:
          description: amount of rx retries
          type: number
        snr:
          description: signal over noise
          type: number
        ssid:
          description: SSID the client is connected to
          type: string
        tx_bps:
          description: rate of transmitting traffic to the clients, bits/seconds,
