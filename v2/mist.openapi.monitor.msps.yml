      responses:
        '200':
          content:
            application/json:
              examples:
                Example 1:
                  value:
                    distinct: status
                    limit: 1000
                    results:
                    - count: 24
                      status: 002e176a-0000-000-1111-002e208b20e1
                    - count: 12
                      status: 2d3f176a-0000-000-2222-002e208f176a
                    - count: 15
                      status: 08b2176a-0000-000-3333-002e208b2d3f
                    total: 3
              schema:
                properties:
                  distinct:
                    type: string
                  limit:
                    type: integer
                  results:
                    items:
                      properties:
                        count:
                          type: integer
                        status:
                          type: string
                      type: object
                    type: array
                  total:
                    type: integer
                type: object
