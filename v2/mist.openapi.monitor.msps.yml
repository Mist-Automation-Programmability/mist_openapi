      tags:
      - Msps SLEs
      - Monitor
    parameters:
    - in: path
      name: msp_id
      required: true
      schema:
        example: 000000ab-00ab-00ab-00ab-0000000000ab
        format: uuid
        type: string
    - description: see /api/v1/const/insight_metrics for available metrics
      in: path
      name: metric
      required: true
      schema:
        type: string
