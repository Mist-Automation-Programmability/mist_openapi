                  mac: 5c5b35000001
                  map_id: 845a23bf-bed9-e43c-4c86-6fa474be7ae5
                  orientation: 45
                floorplans:
                - action: imported
                  id: cbdb7f0b-3be0-4872-88f9-58790b509c23
                  map_id: 845a23bf-bed9-e43c-4c86-6fa474be7ae5
                  name: map1
                site_id: 4ac1dcf4-9d8b-7211-65c4-057819f0862b
                summary:
                  num_ap_assigned: 1
                  num_inv_assigned: 1
                  num_map_assigned: 1
            example-placed:
              value:
                aps:
                - action: placed
                  floorplan_id: b069b358-4c97-5319-1f8c-7c5ca64d6ab1
                  height: 3
                  mac: 5c5b35000001
                  map_id: 845a23bf-bed9-e43c-4c86-6fa474be7ae5
                  orientation: 45
                floorplans:
                - action: imported
                  id: b069b358-4c97-5319-1f8c-7c5ca64d6ab1
                  map_id: 845a23bf-bed9-e43c-4c86-6fa474be7ae5
                  name: map1
                site_id: 4ac1dcf4-9d8b-7211-65c4-057819f0862b
                summary:
                  num_ap_assigned: 1
                  num_inv_assigned: 1
                  num_map_assigned: 1
          schema:
            properties:
              aps:
                items:
                  properties:
                    action:
                      enum:
                      - placed
                      - assigned-placed
                      - named-placed
                      - assigned-named-placed
                      - ignored
                      type: string
                    floorplan_id:
                      format: uuid
                      type: string
                    height:
                      type: number
                    mac:
                      type: string
                    map_id:
                      format: uuid
                      type: string
                    orientation:
                      type: number
                    reason:
                      type: string
                  required:
                  - mac
                  - action
                  - map_id
                  - floorplan_id
                  - orientation
                  type: object
                minItems: 1
                type: array
                uniqueItems: true
              floorplans:
                items:
                  properties:
                    action:
                      type: string
                    id:
                      format: uuid
                      type: string
                    map_id:
                      format: uuid
                      type: string
                    name:
                      type: string
                    reason:
                      type: string
                  required:
                  - id
                  - name
                  - action
                  - map_id
                  type: object
                minItems: 1
                type: array
                uniqueItems: true
              for_site:
                readOnly: true
                type: boolean
              site_id:
                format: uuid
                type: string
              summary:
                properties:
                  num_ap_assigned:
                    type: integer
                  num_inv_assigned:
                    type: integer
                  num_map_assigned:
                    type: integer
                required:
                - num_ap_assigned
                - num_map_assigned
                - num_inv_assigned
                type: object
            required:
            - site_id
            - aps
            - floorplans
            - summary
            type: object
      description: OK
    MapsArray:
      content:
        application/json:
          examples:
            example-1:
              value:
