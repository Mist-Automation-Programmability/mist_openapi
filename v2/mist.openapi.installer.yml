components:
  parameters:
    device_mac:
      in: path
      name: device_mac
      required: true
      schema:
        example: 0000000000ab
        pattern: ^[0-9a-fA-F]{12}$
        type: string
    image_name:
      in: path
      name: image_name
      required: true
      schema:
        type: string
    map_id:
