  /api/v1/register:
    post:
      description: 'Register a new admin and his/her org

        An email will also be sent to the user with a link to https://manage.mist.com/verify/register?token=:token'
      operationId: registerNewAdmin
      requestBody:
        content:
          application/json:
            schema:
              properties:
                account_only:
                  default: false
                  description: skip creating initial setup if true
                  type: boolean
                allow_mist:
                  default: false
                  description: whether to allow Mist to look at this org
                  type: boolean
                email:
                  type: string
                first_name:
                  type: string
                invite_code:
                  description: required initially
                  type: string
                last_name:
                  type: string
                org_name:
                  type: string
                password:
                  type: string
                recaptcha:
                  type: string
                referer_invite_token:
                  description: the invite token to apply after account creation
                  type: string
                return_to:
